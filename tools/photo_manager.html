<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sveta Colours — Photo Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  /* Editorial bone palette — aligned with index.html */
  --bg: #EAE6DE;
  --surface: #F2EFE8;
  --surface-alt: #E0DBD1;
  --paper: #F7F5EF;
  --border: #D6CFC1;
  --border-strong: #BFB6A4;
  --hairline: rgba(20, 19, 15, 0.12);

  --text: #14130F;
  --text-secondary: #3B362D;
  --text-muted: #6B6357;
  --text-faint: #6B6258;

  --accent: #1A2640;
  --accent-hover: #2A3A5C;
  --success: #1F5132;
  --danger: #7A1F1F;

  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body: 'Inter', system-ui, -apple-system, sans-serif;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --shadow-1: 0 1px 2px var(--hairline);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { background: var(--bg); color: var(--text); font-family: var(--font-body); }
body { padding: 1.5rem; line-height: 1.5; }

h1, h2, h3 { font-family: var(--font-display); font-weight: 500; color: var(--text); }
h1 { font-size: 1.75rem; margin-bottom: 1rem; }

.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }

.top-layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 1.5rem; align-items: start; }
.col-right { display: flex; flex-direction: column; gap: 1rem; }
.bottom-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }

@media (max-width: 800px) {
  .top-layout, .bottom-layout { grid-template-columns: 1fr; }
}

.card { background: var(--paper); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
.card-title { font-family: var(--font-display); font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 0.75rem; }

.drop-zone { border: 2px dashed var(--border-strong); border-radius: var(--radius-md); padding: 3rem 1rem; text-align: center; cursor: pointer; background: var(--surface); transition: background 0.15s, border-color 0.15s; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
.drop-zone:hover, .drop-zone:focus-visible, .drop-zone.drag-over { background: var(--surface-alt); border-color: var(--accent); outline: none; }
.drop-zone:focus-visible { box-shadow: 0 0 0 3px rgba(26,38,64,0.25); }
.drop-zone p { color: var(--text-secondary); }
.drop-zone small { color: var(--text-faint); font-size: 0.85em; }

input[type=file] { position: absolute; left: -9999px; }

.canvas-area { position: relative; background: var(--surface); border-radius: var(--radius-md); overflow: hidden; min-height: 180px; display: flex; align-items: center; justify-content: center; }
#preview-canvas { max-width: 100%; display: block; border-radius: var(--radius-md); }
#crop-overlay, #persp-overlay { position: absolute; top: 0; left: 0; pointer-events: none; border-radius: var(--radius-md); }

button { cursor: pointer; font-family: var(--font-body); font-size: 0.9rem; padding: 0.5rem 0.95rem; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--paper); color: var(--text); display: inline-flex; align-items: center; gap: 0.35rem; transition: background 0.12s, border-color 0.12s; }
button:hover { background: var(--surface-alt); }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
button.primary { background: var(--accent); color: var(--paper); border-color: var(--accent); }
button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
button:disabled { opacity: 0.4; cursor: not-allowed; }

input[type=text], input[type=number], select, textarea { font-family: var(--font-body); font-size: 0.9rem; padding: 0.45rem 0.65rem; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--paper); color: var(--text); width: 100%; }
input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }

.field-row { display: flex; gap: 0.5rem; align-items: flex-start; margin-bottom: 0.6rem; }
.field-row label { font-size: 0.85rem; color: var(--text-secondary); min-width: 80px; padding-top: 0.55rem; flex-shrink: 0; }

.status { font-size: 0.85rem; color: var(--text-faint); margin-top: 0.4rem; min-height: 1.2em; }
.status.ok { color: var(--success); }
.status.err { color: var(--danger); }

.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

hr.divider { border: 0; border-top: 1px solid var(--border); margin: 0.75rem 0; }
</style>
</head>

// Returns EXIF orientation 1–8, or 1 if missing/unparseable.
function readExifOrientation(arrayBuffer){
  const v=new DataView(arrayBuffer);
  if(v.byteLength<4||v.getUint16(0)!==0xFFD8) return 1; // not JPEG
  let off=2;
  while(off<v.byteLength){
    if(off+2>v.byteLength) return 1;
    const marker=v.getUint16(off);
    off+=2;
    if(marker===0xFFE1){ // APP1
      if(off+8>v.byteLength) return 1;
      if(v.getUint32(off+2)!==0x45786966) return 1; // "Exif"
      const tiff=off+8;
      if(tiff+8>v.byteLength) return 1;
      const little=v.getUint16(tiff)===0x4949;
      const get16=o=>v.getUint16(o,little);
      const get32=o=>v.getUint32(o,little);
      const ifd=tiff+get32(tiff+4);
      if(ifd+2>v.byteLength) return 1;
      const entries=get16(ifd);
      for(let i=0;i<entries;i++){
        const entry=ifd+2+i*12;
        if(entry+10>v.byteLength) return 1;
        if(get16(entry)===0x0112) return get16(entry+8);
      }
      return 1;
    }
    if((marker&0xFF00)!==0xFF00) return 1;
    if(off+2>v.byteLength) return 1;
    off+=v.getUint16(off);
  }
  return 1;
}

// Bake EXIF orientation into a fresh canvas. Returns a canvas.
function applyOrientationToCanvas(img, o){
  const c=document.createElement('canvas');
  const ctx2=c.getContext('2d');
  const w=img.width, h=img.height;
  if(o>=5 && o<=8){ c.width=h; c.height=w; }
  else { c.width=w; c.height=h; }
  switch(o){
    case 2: ctx2.translate(w,0); ctx2.scale(-1,1); break;
    case 3: ctx2.translate(w,h); ctx2.rotate(Math.PI); break;
    case 4: ctx2.translate(0,h); ctx2.scale(1,-1); break;
    case 5: ctx2.rotate(0.5*Math.PI); ctx2.scale(1,-1); break;
    case 6: ctx2.rotate(0.5*Math.PI); ctx2.translate(0,-h); break;
    case 7: ctx2.rotate(0.5*Math.PI); ctx2.translate(w,-h); ctx2.scale(-1,1); break;
    case 8: ctx2.rotate(-0.5*Math.PI); ctx2.translate(-w,0); break;
  }
  ctx2.drawImage(img,0,0);
  return c;
}

function handleFile(file){
  if(!file) return;
  if(!file.type.startsWith('image/') && !/\.(heic|heif)$/i.test(file.name)){
    setStatus('saveStatus','Only image files (JPG, PNG, WEBP, HEIC) supported.','err');
    return;
  }
  state.titleFilled=false;state.aiData=null;state.aiDataDims=null;

  const reader=new FileReader();
  reader.onload=async e=>{
    const buf=e.target.result;
    const orientation = file.type==='image/jpeg' ? readExifOrientation(buf) : 1;
    const blob=new Blob([buf],{type:file.type||'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onerror=()=>{
      URL.revokeObjectURL(url);
      setStatus('saveStatus','Could not decode image (corrupted or unsupported format).','err');
    };
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const oriented=applyOrientationToCanvas(img,orientation);
      state.origImg=oriented;
      setupCanvasFromCanvas(oriented);
      document.getElementById('resizeW').value=oriented.width;
      document.getElementById('resizeH').value=oriented.height;
      document.getElementById('fYear').value=new Date().getFullYear();
      dz.style.display='none';
      document.getElementById('workArea').style.display='block';
      document.getElementById('bottomLayout').style.display='grid';
      const name=file.name.replace(/\.[^.]+$/,'');
      document.getElementById('fTitle').value=name;
      drawPreview();
      // analyzeWithAI is introduced in Task 9; for now keep the existing analyzeWithClaude.
      analyzeWithClaude(file).catch(err=>console.warn('AI:',err));
    };
    img.src=url;
  };
  reader.readAsArrayBuffer(file);
}

// Seed the off-screen full-resolution canvas and the on-screen preview.
function setupCanvas(img){
  state.fullCanvas.width = img.width;
  state.fullCanvas.height = img.height;
  fullCtx.drawImage(img, 0, 0);
  fitPreviewToFull();
  syncOverlayCanvases();
  updateDimInfo();
}

// Used by transforms (crop, persp, resize) that produce a new canvas.
function setupCanvasFromCanvas(srcCanvas){
  state.fullCanvas.width = srcCanvas.width;
  state.fullCanvas.height = srcCanvas.height;
  fullCtx.drawImage(srcCanvas, 0, 0);
  fitPreviewToFull();
  syncOverlayCanvases();
  updateDimInfo();
}

function fitPreviewToFull(){
  const area = document.getElementById('canvasArea');
  const maxW = area.clientWidth || 600, maxH = 460;
  const fw = state.fullCanvas.width || 1, fh = state.fullCanvas.height || 1;
  const scale = Math.min(maxW / fw, maxH / fh, 1);
  canvas.width = Math.round(fw * scale);
  canvas.height = Math.round(fh * scale);
  drawPreview();
}

function syncOverlayCanvases(){
  for (const ov of [cropOv, perspOv]) {
    ov.width = canvas.width;
    ov.height = canvas.height;
    ov.style.width = canvas.width + 'px';
    ov.style.height = canvas.height + 'px';
  }
}

function updateDimInfo(){
  document.getElementById('dimInfo').textContent =
    `${state.fullCanvas.width} × ${state.fullCanvas.height} px (preview ${canvas.width}×${canvas.height})`;
}

function drawPreview(){
  if(!state.fullCanvas.width) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.filter = buildFilter();
  ctx.drawImage(state.fullCanvas, 0, 0, canvas.width, canvas.height);
  ctx.filter = 'none';
  drawWatermarkOnContext(ctx, canvas.width, canvas.height);
}

// Thin wrapper kept for legacy callers (slider listeners, autoCorrectAll).
function applyAll(){
  drawPreview();
}

function buildFilter(){const b=+document.getElementById('brightness').value,c=+document.getElementById('contrast').value,s=+document.getElementById('saturation').value;return `brightness(${1+b/100}) contrast(${1+c/100}) saturate(${1+s/100})`;}

function drawWatermarkOnContext(c, w, h){
  const text = document.getElementById('wmText').value.trim();
  if (!text) return;
  const op = +document.getElementById('wmOpacity').value / 100;
  const fs = Math.max(12, Math.round(w / 24));
  c.save();
  c.font = `${fs}px sans-serif`;
  c.fillStyle = `rgba(255,255,255,${op})`;
  c.strokeStyle = `rgba(0,0,0,${op * 0.5})`;
  c.lineWidth = Math.max(1, fs / 16);
  c.textAlign = 'right';
  c.textBaseline = 'bottom';
  const x = w - Math.round(w / 100);
  const y = h - Math.round(h / 100);
  c.strokeText(text, x, y);
  c.fillText(text, x, y);
  c.restore();
}

// Compose a Blob from the full-res canvas with filters + watermark applied.
async function composeFullBlob(format = 'image/jpeg', quality = 0.9){
  const out = document.createElement('canvas');
  out.width = state.fullCanvas.width;
  out.height = state.fullCanvas.height;
  const octx = out.getContext('2d');
  octx.filter = buildFilter();
  octx.drawImage(state.fullCanvas, 0, 0);
  octx.filter = 'none';
  drawWatermarkOnContext(octx, out.width, out.height);
  return await new Promise(r => out.toBlob(r, format, quality));
}

// ── AUTO-CORRECT: Perspective → Crop → Adjustments ──
async function autoCorrectAll(){
  const btn=document.getElementById('btnAutoCorrect');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Working…';
  const steps=document.getElementById('autoSteps');
  steps.style.display='block';

  const order=['persp','crop','adjust'];
  const labels={persp:'Perspective',crop:'Crop',adjust:'Adjustments'};

  const S=(activeId,state)=>{
    steps.innerHTML=order.map(k=>{
      const idx=order.indexOf(k),aidx=order.indexOf(activeId);
      const cls=k===activeId?'step-'+state:idx<aidx?'step-done':'step-pending';
      const icon=idx<aidx?'✓':k===activeId&&state==='active'?'<span class="spinner dark"></span>':'·';
      return `<span class="${cls}">${icon} ${labels[k]}</span>`;
    }).join('');
  };

  if(!state.aiData){await analyzeWithClaude(null,true);}

  // 1. Perspective
  S('persp','active');
  if(state.aiData?.needs_perspective_correction){await runAutoPersp();}
  S('persp','done');

  // 2. Crop
  S('crop','active');
  if(state.aiData?.needs_crop&&state.aiData?.crop){await runAutoCrop(state.aiData.crop);}
  S('crop','done');

  // 3. Adjustments
  S('adjust','active');
  if(state.aiData){
    setSlider('brightness',state.aiData.brightness_adjust||0);
    setSlider('contrast',state.aiData.contrast_adjust||0);
    setSlider('saturation',state.aiData.saturation_adjust||0);
    applyAll();
  }
  await sleep(150);

  steps.innerHTML=`<span class="step-done">✓ Perspective &nbsp; ✓ Crop &nbsp; ✓ Adjustments — review and adjust if needed</span>`;
  btn.disabled=false;btn.innerHTML='<i class="ti ti-wand" aria-hidden="true"></i> Auto-correct';
}

function setSlider(id,val){
  const map={brightness:'bv',contrast:'cv',saturation:'sv'};
  document.getElementById(id).value=val;document.getElementById(map[id]).textContent=val;
}
function fillFields(d){
  if(d.description)document.getElementById('fDesc').value=d.description;
  if(d.medium)document.getElementById('fMedium').value=d.medium;
  if(d.tags?.length)document.getElementById('fTags').value=d.tags.join(', ');
  if(d.style){const n=document.getElementById('fNotes');n.value=n.value?n.value+'; '+d.style:d.style;}
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ── CLAUDE ANALYSIS ──
async function analyzeWithClaude(file,silent=false){
  const box=document.getElementById('aiBox');
  if(!silent)box.innerHTML='<span class="spinner dark"></span> Analyzing…';
  const b64=file?await fileToBase64(file):await canvasToBase64();
  const mtype=file?file.type||'image/jpeg':'image/jpeg';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mtype,data:b64}},
        {type:'text',text:`Analyze this artwork photo. Respond ONLY with JSON (no markdown, no backticks):
{
  "description": "2-3 sentence description of the artwork",
  "medium": "infer from visual: oil on canvas, watercolor, acrylic, etc.",
  "style": "art style or movement",
  "tags": ["tag1","tag2","tag3","tag4"],
  "brightness_adjust": integer -100 to 100,
  "contrast_adjust": integer -100 to 100,
  "saturation_adjust": integer -100 to 100,
  "needs_perspective_correction": true or false,
  "perspective_corners": {"tl":{"x":0.1,"y":0.1},"tr":{"x":0.9,"y":0.1},"br":{"x":0.9,"y":0.9},"bl":{"x":0.1,"y":0.9}},
  "needs_crop": true or false,
  "crop": {"x":0.0,"y":0.0,"w":1.0,"h":1.0},
  "quality_notes": "brief"
}
crop: x,y=top-left as fraction of image, w,h=size as fraction. Suggest crop to remove backgrounds/borders/extra space around artwork. If well-framed already set needs_crop=false.`}
      ]}]})
    });
    const data=await res.json();
    const text=(data.content||[]).find(b=>b.type==='text')?.text||'';
    state.aiData=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(!silent){
      box.innerHTML=`<b>${state.aiData.description}</b><br><br>`+
        `<b>Medium:</b> ${state.aiData.medium||'—'} &nbsp; <b>Style:</b> ${state.aiData.style||'—'}<br>`+
        `<b>Quality:</b> ${state.aiData.quality_notes}<br>`+
        `<b>Perspective:</b> ${state.aiData.needs_perspective_correction?'<span style="color:#f59e0b">needs correction</span>':'ok'} &nbsp; `+
        `<b>Crop:</b> ${state.aiData.needs_crop?'<span style="color:#f59e0b">suggested</span>':'ok'}<br>`+
        `<b>Tags:</b> ${(state.aiData.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}`;
      // auto-fill fields if title already present
      const title=document.getElementById('fTitle').value.trim();
      if(title&&!state.titleFilled){fillFields(state.aiData);state.titleFilled=true;}
    }
  }catch(e){
    if(!silent)box.innerHTML=`<span style="color:var(--color-text-danger)">API error: ${e.message}</span>`;
  }
}

// ── PERSPECTIVE ──
async function runAutoPersp(){
  if(!state.aiData?.perspective_corners)return;
  const j=state.aiData.perspective_corners;
  const sW=state.fullCanvas.width,sH=state.fullCanvas.height;
  const srcPts=[
    {x:j.tl.x*sW,y:j.tl.y*sH},
    {x:j.tr.x*sW,y:j.tr.y*sH},
    {x:j.br.x*sW,y:j.br.y*sH},
    {x:j.bl.x*sW,y:j.bl.y*sH},
  ];
  const [tl,tr,br,bl]=srcPts;
  const dstW=Math.round(Math.max(Math.hypot(tr.x-tl.x,tr.y-tl.y),Math.hypot(br.x-bl.x,br.y-bl.y)));
  const dstH=Math.round(Math.max(Math.hypot(bl.x-tl.x,bl.y-tl.y),Math.hypot(br.x-tr.x,br.y-tr.y)));
  if(dstW<2||dstH<2)return;
  const dstPts=[{x:0,y:0},{x:dstW,y:0},{x:dstW,y:dstH},{x:0,y:dstH}];
  try{
    const Hinv=computeHomography(dstPts,srcPts);
    const warped=applyHomographyToCanvas(state.fullCanvas,Hinv,dstW,dstH);
    setupCanvasFromCanvas(warped);
    document.getElementById('resizeW').value=dstW;
    document.getElementById('resizeH').value=dstH;
  }catch(e){
    console.warn('Auto-perspective failed:',e);
  }
}

async function runAutoCrop(c){
  const sw=Math.round(c.w*state.fullCanvas.width),sh=Math.round(c.h*state.fullCanvas.height);
  const sx=Math.round(c.x*state.fullCanvas.width),sy=Math.round(c.y*state.fullCanvas.height);
  if(sw<10||sh<10)return;
  const tmp=document.createElement('canvas');tmp.width=sw;tmp.height=sh;
  tmp.getContext('2d').drawImage(state.fullCanvas,sx,sy,sw,sh,0,0,sw,sh);
  setupCanvasFromCanvas(tmp);
  document.getElementById('resizeW').value=sw;
  document.getElementById('resizeH').value=sh;
}

// ── HOMOGRAPHY (CPU) ──
// Direct Linear Transform. Returns row-major 3x3 mapping s -> d.
function computeHomography(s, d){
  const A=[];
  for(let i=0;i<4;i++){
    const {x:X,y:Y}=s[i];
    const {x:u,y:v}=d[i];
    A.push([-X,-Y,-1, 0, 0, 0, X*u, Y*u, u]);
    A.push([0, 0, 0,-X,-Y,-1, X*v, Y*v, v]);
  }
  // Solve A * h = 0 with h[8] = 1: move last column to RHS, solve 8x8 system.
  const M=A.map(r=>r.slice(0,8));
  const b=A.map(r=>-r[8]);
  const h=solveLinear(M,b); // length 8
  return [...h,1];
}

// Gaussian elimination with partial pivoting on an n x n system. M is n x n, b is n.
function solveLinear(M, b){
  const n=M.length;
  const A=M.map((r,i)=>[...r,b[i]]);
  for(let c=0;c<n;c++){
    let pivot=c;
    for(let r=c+1;r<n;r++) if(Math.abs(A[r][c])>Math.abs(A[pivot][c])) pivot=r;
    [A[c],A[pivot]]=[A[pivot],A[c]];
    const piv=A[c][c];
    if(Math.abs(piv)<1e-12) throw new Error('Degenerate homography');
    for(let r=0;r<n;r++){
      if(r===c) continue;
      const f=A[r][c]/piv;
      for(let k=c;k<=n;k++) A[r][k]-=f*A[c][k];
    }
  }
  return A.map((row,i)=>row[n]/row[i]);
}

// Per-output-pixel bilinear sampling. Hinv maps output (x,y) -> source (sx,sy).
function applyHomographyToCanvas(src, Hinv, outW, outH){
  const srcCtx=src.getContext('2d');
  const srcData=srcCtx.getImageData(0,0,src.width,src.height).data;
  const out=document.createElement('canvas');
  out.width=outW; out.height=outH;
  const outCtx=out.getContext('2d');
  const outData=outCtx.createImageData(outW,outH);
  const od=outData.data;
  const [a,b,c,d,e,f,g,h,i]=Hinv;
  const sW=src.width, sH=src.height;

  for(let y=0;y<outH;y++){
    for(let x=0;x<outW;x++){
      const w=g*x+h*y+i;
      const sx=(a*x+b*y+c)/w;
      const sy=(d*x+e*y+f)/w;
      const idx=(y*outW+x)*4;
      if(sx<0||sy<0||sx>=sW-1||sy>=sH-1){
        od[idx]=od[idx+1]=od[idx+2]=0; od[idx+3]=0; continue;
      }
      const x0=sx|0, y0=sy|0, dx=sx-x0, dy=sy-y0;
      const i00=(y0*sW+x0)*4;
      const i10=i00+4;
      const i01=i00+sW*4;
      const i11=i01+4;
      const wa=(1-dx)*(1-dy), wb=dx*(1-dy), wc2=(1-dx)*dy, wd=dx*dy;
      od[idx]   = srcData[i00]   *wa + srcData[i10]   *wb + srcData[i01]   *wc2 + srcData[i11]   *wd;
      od[idx+1] = srcData[i00+1] *wa + srcData[i10+1] *wb + srcData[i01+1] *wc2 + srcData[i11+1] *wd;
      od[idx+2] = srcData[i00+2] *wa + srcData[i10+2] *wb + srcData[i01+2] *wc2 + srcData[i11+2] *wd;
      od[idx+3] = 255;
    }
  }
  outCtx.putImageData(outData,0,0);
  return out;
}

function applyPersp(){
  if(state.perspPoints.length!==4)return cancelPersp();
  const btn=document.getElementById('btnApplyPersp');
  const prevLabel=btn.innerHTML;
  btn.disabled=true; btn.textContent='Applying…';
  // Yield to the browser so the button update paints before the long synchronous warp.
  setTimeout(()=>{
    try{
      // Points are in preview-canvas coords; scale to full-res coords.
      const sxScale=state.fullCanvas.width/canvas.width;
      const syScale=state.fullCanvas.height/canvas.height;
      const srcPts=state.perspPoints.map(p=>({x:p.x*sxScale,y:p.y*syScale}));

      // Output rectangle: bounding box of the source quad (preserves overall scale).
      const minX=Math.min(...srcPts.map(p=>p.x));
      const maxX=Math.max(...srcPts.map(p=>p.x));
      const minY=Math.min(...srcPts.map(p=>p.y));
      const maxY=Math.max(...srcPts.map(p=>p.y));
      const outW=Math.round(maxX-minX);
      const outH=Math.round(maxY-minY);
      if(outW<2||outH<2) throw new Error('Output rectangle too small');

      // dst corners ordered tl,tr,br,bl — must match state.perspPoints order
      // (resetPerspPoints sets that order; AI seeding via autoPersp matches; corner-handle
      // dragging by the user preserves the slot index, so order is stable).
      const dstPts=[{x:0,y:0},{x:outW,y:0},{x:outW,y:outH},{x:0,y:outH}];

      // Inverse mapping output -> source: swap args (DLT solver is symmetric).
      const Hinv=computeHomography(dstPts,srcPts);
      const warped=applyHomographyToCanvas(state.fullCanvas,Hinv,outW,outH);

      state.fullCanvas.width=warped.width;
      state.fullCanvas.height=warped.height;
      fullCtx.drawImage(warped,0,0);

      state.perspMode=false; state.perspPoints=[]; state.dragIdx=-1;
      clearPerspOv();
      togglePerspUI(false);
      fitPreviewToFull();
      syncOverlayCanvases();
      updateDimInfo();
      document.getElementById('resizeW').value=state.fullCanvas.width;
      document.getElementById('resizeH').value=state.fullCanvas.height;
    }catch(err){
      console.warn('Perspective failed:',err);
      setStatus('saveStatus','Perspective failed: pick 4 non-collinear points','err');
    }finally{
      btn.disabled=false;
      btn.innerHTML=prevLabel;
    }
  },0);
}

function toggleCrop(){
  if(state.perspMode)cancelPersp();
  state.cropMode=!state.cropMode;
  toggleCropUI(state.cropMode);

function cancelCrop(){
  state.cropMode=false;state.cropRect=null;

  toggleCropUI(false);

cropOv.addEventListener('mousedown',e=>{if(!state.cropMode)return;const r=cropOv.getBoundingClientRect();state.cropStart={x:e.clientX-r.left,y:e.clientY-r.top};});
cropOv.addEventListener('mousemove',e=>{if(!state.cropMode||!state.cropStart)return;const r=cropOv.getBoundingClientRect();const cx=Math.min(Math.max(e.clientX-r.left,0),canvas.width),cy=Math.min(Math.max(e.clientY-r.top,0),canvas.height);state.cropRect={x:Math.min(state.cropStart.x,cx),y:Math.min(state.cropStart.y,cy),w:Math.abs(cx-state.cropStart.x),h:Math.abs(cy-state.cropStart.y)};drawCropOv();});
cropOv.addEventListener('mouseup',()=>{state.cropStart=null;});
function drawCropOv(){
  const cropRect=state.cropRect;
  cropCtx.clearRect(0,0,cropOv.width,cropOv.height);
  if(!cropRect||cropRect.w<2||cropRect.h<2)return;
  cropCtx.fillStyle='rgba(0,0,0,.45)';cropCtx.fillRect(0,0,cropOv.width,cropOv.height);
  cropCtx.clearRect(cropRect.x,cropRect.y,cropRect.w,cropRect.h);
  cropCtx.strokeStyle='rgba(255,255,255,.9)';cropCtx.lineWidth=1.5;
  cropCtx.strokeRect(cropRect.x,cropRect.y,cropRect.w,cropRect.h);
  const gx=cropRect.w/3,gy=cropRect.h/3;
  cropCtx.strokeStyle='rgba(255,255,255,.3)';cropCtx.lineWidth=.5;
  for(let i=1;i<3;i++){
    cropCtx.beginPath();cropCtx.moveTo(cropRect.x+gx*i,cropRect.y);cropCtx.lineTo(cropRect.x+gx*i,cropRect.y+cropRect.h);cropCtx.stroke();
    cropCtx.beginPath();cropCtx.moveTo(cropRect.x,cropRect.y+gy*i);cropCtx.lineTo(cropRect.x+cropRect.w,cropRect.y+gy*i);cropCtx.stroke();
  }
}
function clearCropOv(){cropCtx.clearRect(0,0,cropOv.width,cropOv.height);}

function applyCrop(){
  const r=state.cropRect;
  if(!r||r.w<4||r.h<4){cancelCrop();return;}
  // Convert preview-canvas rect to full-res rect
  const fx=Math.round(r.x/canvas.width*state.fullCanvas.width);
  const fy=Math.round(r.y/canvas.height*state.fullCanvas.height);
  const fw=Math.round(r.w/canvas.width*state.fullCanvas.width);
  const fh=Math.round(r.h/canvas.height*state.fullCanvas.height);
  const next=document.createElement('canvas');
  next.width=fw;next.height=fh;
  next.getContext('2d').drawImage(state.fullCanvas,fx,fy,fw,fh,0,0,fw,fh);
  setupCanvasFromCanvas(next);
  document.getElementById('resizeW').value=fw;
  document.getElementById('resizeH').value=fh;
  cancelCrop();
}

function applyResize(){
  const w=+document.getElementById('resizeW').value;
  const h=+document.getElementById('resizeH').value;
  if(!(w>0 && h>0 && w<=8000 && h<=8000)){
    setStatus('saveStatus','Resize: width and height must be 1–8000','err');
    return;
  }
  if(!state.fullCanvas.width)return;
  const next=document.createElement('canvas');
  next.width=w;next.height=h;
  next.getContext('2d').drawImage(state.fullCanvas,0,0,w,h);
  setupCanvasFromCanvas(next);
}

function resetToOriginal(){
  if(!state.origImg)return;
  // origImg is a canvas (EXIF-corrected) after Task 5, but the same shape works for an Image too
  setupCanvasFromCanvas(state.origImg);
  ['brightness','contrast','saturation'].forEach(id=>{document.getElementById(id).value=0;});
  ['bv','cv','sv'].forEach(id=>{document.getElementById(id).textContent='0';});

  document.getElementById('resizeW').value=state.origImg.width;
  document.getElementById('resizeH').value=state.origImg.height;
  cancelCrop();cancelPersp();
  document.getElementById('autoSteps').style.display='none';
}

// ── EXPORT ──
function getMime(){const f=document.getElementById('exportFormat').value;return f==='png'?'image/png':f==='webp'?'image/webp':'image/jpeg';}
function getExt(){const f=document.getElementById('exportFormat').value;return f==='jpeg'?'jpg':f;}
function getQ(){return+document.getElementById('jpegQuality').value/100;}

async function downloadImg(){
  if(!state.fullCanvas.width){setStatus('saveStatus','Upload an image first','err');return;}
  const mime=getMime(),q=getQ();
  const blob=await composeFullBlob(mime,q);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(document.getElementById('fTitle').value.trim()||'photo')+'.'+getExt();
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}

// Base64 of the full-res composite (downscaled to keep payload sane for AI).
async function canvasToBase64(){
  const blob=await composeFullBlob('image/jpeg',0.85);
  // Downscale via off-screen canvas if larger than ~800 longest edge for AI payload size
  const bmp=await createImageBitmap(blob);
  const scale=Math.min(1,800/Math.max(bmp.width,bmp.height));
  const tmp=document.createElement('canvas');
  tmp.width=Math.round(bmp.width*scale);
  tmp.height=Math.round(bmp.height*scale);
  tmp.getContext('2d').drawImage(bmp,0,0,tmp.width,tmp.height);
  return tmp.toDataURL('image/jpeg',0.85).split(',')[1];
}

// ── GOOGLE AUTH ──
function getAccessToken() {
  return new Promise((resolve, reject) => {
    if (state.cachedToken && Date.now() < state.cachedTokenExpiresAt) return resolve(state.cachedToken);
    if (!window.google?.accounts?.oauth2) return reject(new Error('GIS not loaded'));
    const client = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets',
      callback: r => {
        if (r.error) return reject(new Error('OAuth: ' + r.error));
        state.cachedToken = r.access_token;
        state.cachedTokenExpiresAt = Date.now() + (r.expires_in - 30) * 1000;
        resolve(r.access_token);
      },
      error_callback: err => reject(new Error('OAuth cancelled: ' + (err && err.type)))
    });
    client.requestAccessToken();
  });
}

// ── SAVE ALL ──
async function saveAll() {
  if (state.saveInFlight) return;
  state.saveInFlight = true;
  const btn = document.getElementById('btnSaveAll');
  btn.disabled = true;
  setStatus('saveStatus', 'Saving…');
  try {
    const token = await getAccessToken();
    const driveLink = await uploadToDrive(token);  // composes full-res blob inside
    await upsertSheetRow(token, driveLink);
    setStatus('saveStatus', 'Saved.', 'ok');
  } catch (e) {
    setStatus('saveStatus', 'Save failed: ' + e.message, 'err');
  } finally {
    state.saveInFlight = false;
    btn.disabled = false;
  }
}
async function uploadToDrive(token) {
  const fmt = document.getElementById('exportFormat').value;
  const mime = fmt === 'png' ? 'image/png' : fmt === 'webp' ? 'image/webp' : 'image/jpeg';
  const q = +document.getElementById('jpegQuality').value / 100;
  const blob = await composeFullBlob(mime, q);

  const title = (document.getElementById('fTitle').value.trim() || 'untitled') + '.' + fmt;
  const meta = { name: title, parents: [DRIVE_FOLDER] };

  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
  form.append('file', blob);

  const res = await fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink',
    { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: form }
  );
  if (!res.ok) throw new Error('Drive upload failed: ' + res.status);
  const j = await res.json();
  return j.webViewLink;
}

// Sheets RAW already prevents formula execution, but normalize for dedup/display.
function sanitizeCell(s) {
  if (s == null) return '';
  return String(s).replace(/\r\n/g, '\n').trim();
}

function normalizeTitle(s) {
  return sanitizeCell(s).toLowerCase().replace(/\s+/g, ' ');
}

async function upsertSheetRow(token, driveLink) {
  // 1) Read existing A:B (Date + Title) to find dedup target
  const readRes = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_TAB}!A:B`,
    { headers: { Authorization: 'Bearer ' + token } }
  );
  if (!readRes.ok) throw new Error('Sheets read failed: ' + readRes.status);
  const rows = (await readRes.json()).values || [];

  // 2) Ensure header row exists FIRST and is committed before any further write
  if (rows.length === 0 || normalizeTitle(rows[0][1] || '') !== 'title') {
    const headRes = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_TAB}!A1?valueInputOption=RAW`,
      { method: 'PUT', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [COLS] }) }
    );
    if (!headRes.ok) throw new Error('Sheets header init failed: ' + headRes.status);
  }

  // 3) Compose row from form fields
  const title = document.getElementById('fTitle').value;
  const normTitle = normalizeTitle(title);
  const row = COLS.map(col => sanitizeCell(getCellForCol(col, driveLink)));

  // 4) Find existing row by normalized title (skip header)
  let foundIdx = -1;
  for (let i = 1; i < rows.length; i++) {
    if (rows[i] && normalizeTitle(rows[i][1] || '') === normTitle) { foundIdx = i; break; }
  }

  if (foundIdx >= 0) {
    const rowNum = foundIdx + 1;
    const range = `${SHEET_TAB}!A${rowNum}:${String.fromCharCode(64 + COLS.length)}${rowNum}`;
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?valueInputOption=RAW`,
      { method: 'PUT', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ range, values: [row] }) }
    );
    if (!res.ok) throw new Error('Sheets update failed: ' + res.status);
  } else {
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_TAB}!A1:append?valueInputOption=RAW`,
      { method: 'POST', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [row] }) }
    );
    if (!res.ok) throw new Error('Sheets append failed: ' + res.status);
  }
}

function getCellForCol(col, driveLink) {
  const m = {
    'Date': new Date().toISOString().slice(0, 10),
    'Title': document.getElementById('fTitle').value,
    'Description': document.getElementById('fDesc').value,
    'Medium': document.getElementById('fMedium').value,
    'Size': document.getElementById('fSize').value,
    'Year': document.getElementById('fYear').value,
    'Tags': document.getElementById('fTags').value,
    'Status': document.getElementById('fStatus').value,
    'Price': document.getElementById('fPrice').value,
    'Notes': document.getElementById('fNotes').value,
    'Dimensions': `${state.fullCanvas.width}×${state.fullCanvas.height}`,
    'Format': document.getElementById('exportFormat').value,
    'Drive link': driveLink,
  };
  return m[col] || '';
}
function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Read failed'));r.readAsDataURL(file);});}

// ── SELF-TESTS (?test=1) ──
if(new URLSearchParams(location.search).get('test')==='1'){
  // Sanity: identity homography — unit square -> unit square
  const H=computeHomography(
    [{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:0,y:1}],
    [{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:0,y:1}]
  );
  console.assert(Math.abs(H[0]-1)<1e-9,'identity[0]');
  console.assert(Math.abs(H[4]-1)<1e-9,'identity[4]');
  console.assert(Math.abs(H[8]-1)<1e-9,'identity[8]');
  console.log('Homography self-test OK');
}
