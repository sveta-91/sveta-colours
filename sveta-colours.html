<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sveta Colours — Original Paintings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ========================================================
   SVETA COLOURS — WARM GALLERY DESIGN
   ======================================================== */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Warm palette */
  --bg: #F4EFE6;
  --surface: #FAF7F2;
  --surface-alt: #EDE7DC;
  --border: #DDD5C8;
  --border-strong: #CEC4B4;
  --text: #1C1712;
  --text-secondary: #5A5048;
  --text-muted: #8A7D72;

  /* Accents */
  --clay: #B5613D;
  --terracotta: #C8714F;
  --rose-dust: #C49A93;
  --sold-red: #A35A52;

  /* Type */
  --font-display: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  --font-body: 'Inter', system-ui, -apple-system, sans-serif;

  /* Layout */
  --max-w: 1200px;
  --transition: 0.28s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

::selection {
  background: var(--rose-dust);
  color: var(--text);
}

img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }

/* --- Navigation --- */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(244, 239, 230, 0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(206, 196, 180, 0.4);
}

nav .nav-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 2rem;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

nav .logo {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--text);
}

nav .nav-links { display: flex; gap: 2.2rem; list-style: none; align-items: center; }

nav .nav-links a {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-secondary);
  transition: color var(--transition);
}

nav .nav-links a:hover { color: var(--text); }

nav .nav-contact {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--clay);
  transition: color var(--transition);
}
nav .nav-contact:hover { color: var(--terracotta); }

.hamburger {
  display: none;
  background: none;
  border: none;
  width: 28px;
  height: 20px;
  flex-direction: column;
  justify-content: space-between;
}

.hamburger span {
  display: block; width: 100%; height: 1.5px;
  background: var(--text);
  transition: var(--transition);
}

/* --- Buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 48px;
  padding: 0 1.8rem;
  border: none;
  border-radius: 100px;
  font-size: 0.9rem;
  font-weight: 500;
  transition: all var(--transition);
}

.btn-primary {
  background: var(--clay);
  color: var(--surface);
}
.btn-primary:hover { background: var(--terracotta); }

.btn-outline {
  background: transparent;
  border: 1px solid var(--border-strong);
  color: var(--text-secondary);
}
.btn-outline:hover { border-color: var(--text-secondary); color: var(--text); }

.btn-text {
  background: none; border: none; height: auto; padding: 0;
  color: var(--clay);
  font-size: 0.88rem;
  font-weight: 500;
}
.btn-text:hover { color: var(--terracotta); }

/* --- Sections --- */
section { padding: 5.5rem 2rem; }

.section-inner {
  max-width: var(--max-w);
  margin: 0 auto;
}

.section-title {
  margin-bottom: 3rem;
}

.section-title h2 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 500;
  line-height: 1.05;
  color: var(--text);
}

.section-title p {
  margin-top: 0.6rem;
  color: var(--text-muted);
  font-size: 0.93rem;
}

.section-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

/* --- Hero --- */
.hero {
  min-height: 88vh;
  display: flex;
  align-items: center;
  padding-top: 72px;
}

.hero .hero-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
}

.hero-text h1 {
  font-family: var(--font-display);
  font-size: clamp(2.6rem, 5vw, 4rem);
  font-weight: 500;
  line-height: 1.05;
  margin-bottom: 1.2rem;
  color: var(--text);
}

.hero-text .subtitle {
  font-size: 1.05rem;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 2.2rem;
  max-width: 440px;
}

.hero-text .hero-buttons { display: flex; gap: 0.8rem; flex-wrap: wrap; }

.hero-image {
  aspect-ratio: 4/5;
  border-radius: 20px;
  overflow: hidden;
  background: linear-gradient(145deg, #E8C4A0, #D4956B);
}

.hero-image img {
  width: 100%; height: 100%;
  object-fit: contain;
}

/* --- Gallery Grid --- */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 2rem;
}

.painting-card {
  cursor: pointer;
  transition: transform var(--transition);
}

.painting-card:hover { transform: translateY(-3px); }

.painting-card .card-image {
  aspect-ratio: 4/5;
  overflow: hidden;
  border-radius: 12px;
  background: var(--surface-alt);
  margin-bottom: 1rem;
}

.painting-card .card-image img {
  width: 100%; height: 100%;
  object-fit: contain;
  transition: transform 0.4s ease;
}

.painting-card:hover .card-image img { transform: scale(1.03); }

.painting-card .card-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.2rem;
}

.painting-card .card-medium {
  font-size: 0.75rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 0.3rem;
}

.painting-card .card-price {
  font-size: 0.93rem;
  font-weight: 500;
  color: var(--clay);
}

.painting-card .card-price.sold {
  color: var(--text-muted);
  font-style: italic;
}

/* --- Category Split --- */
.categories { background: var(--surface); }

.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 2rem;
}

.category-card {
  padding: 3rem 2.5rem;
  background: var(--bg);
  border-radius: 16px;
  border: 1px solid var(--border);
  text-align: center;
  transition: border-color var(--transition);
}

.category-card:hover { border-color: var(--border-strong); }

.category-card h3 {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 500;
  margin-bottom: 0.6rem;
}

.category-card p {
  color: var(--text-muted);
  font-size: 0.93rem;
  margin-bottom: 1.5rem;
}

/* --- About Preview --- */
.about-preview {
  max-width: 640px;
}

.about-preview p {
  color: var(--text-secondary);
  font-size: 1.05rem;
  line-height: 1.75;
  margin-bottom: 1rem;
}

.about-preview .btn-text { margin-top: 0.8rem; }

/* --- Contact --- */
.contact { background: var(--surface-alt); text-align: center; }

.contact p {
  color: var(--text-secondary);
  margin-bottom: 1rem;
  font-size: 1rem;
}

.contact .email-link {
  font-family: var(--font-display);
  font-size: 1.3rem;
  color: var(--clay);
  font-weight: 500;
  transition: color var(--transition);
}

.contact .email-link:hover { color: var(--terracotta); }

/* --- Collection Header --- */
.collection-header {
  text-align: center;
  padding: 7rem 2rem 2.5rem;
}

.collection-header h1 {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 5vw, 3.4rem);
  font-weight: 500;
  line-height: 1.05;
  margin-bottom: 0.5rem;
}

.collection-header p {
  color: var(--text-muted);
  font-size: 0.95rem;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  color: var(--text-muted);
  font-size: 0.88rem;
  margin-bottom: 1.5rem;
  transition: color var(--transition);
}
.back-link:hover { color: var(--text); }

/* --- Detail Modal --- */
.modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(28, 23, 18, 0.45);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  overflow-y: auto;
  padding: 2rem;
}

.modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

.modal {
  background: var(--surface);
  border-radius: 16px;
  max-width: 880px;
  width: 100%;
  margin: 3rem auto;
  overflow: hidden;
  box-shadow: 0 12px 48px rgba(0,0,0,0.12);
  animation: modalIn 0.28s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-close {
  position: absolute;
  top: 1rem; right: 1.2rem;
  background: none; border: none;
  font-size: 1.6rem;
  color: var(--text-muted);
  z-index: 10;
  line-height: 1;
}
.modal-close:hover { color: var(--text); }

.modal-content {
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.modal-image {
  background: var(--surface-alt);
  min-height: 400px;
}

.modal-image img { width: 100%; height: 100%; object-fit: contain; }

.modal-details {
  padding: 2.5rem;
  display: flex;
  flex-direction: column;
}

.modal-details h2 {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 500;
  margin-bottom: 0.8rem;
  line-height: 1.1;
}

.modal-details .description {
  color: var(--text-secondary);
  margin-bottom: 1.5rem;
  line-height: 1.7;
  font-size: 0.95rem;
}

.modal-meta {
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
  margin-bottom: 1.5rem;
  font-size: 0.9rem;
}

.modal-meta span { display: flex; gap: 0.5rem; }

.modal-meta .label {
  color: var(--text-muted);
  min-width: 65px;
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.modal-status {
  display: inline-block;
  padding: 0.25rem 0.7rem;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 500;
  margin-bottom: 1.5rem;
  width: fit-content;
}

.modal-status.available { background: #E8F0E8; color: #4A6B4A; }
.modal-status.sold { background: #F2E6E4; color: var(--sold-red); }

.modal-details .btn { margin-top: auto; }

/* --- About Full --- */
.about-full { max-width: 640px; }

.about-full p {
  font-size: 1.05rem;
  line-height: 1.75;
  color: var(--text-secondary);
  margin-bottom: 1.2rem;
}

/* --- Footer --- */
footer {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  font-size: 0.82rem;
  border-top: 1px solid var(--border);
}

/* --- Responsive --- */
@media (max-width: 768px) {
  .hamburger { display: flex; }

  nav .nav-links {
    display: none;
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: rgba(244, 239, 230, 0.98);
    backdrop-filter: blur(14px);
    flex-direction: column;
    padding: 1.5rem 2rem;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
  }

  nav .nav-links.open { display: flex; }

  .hero .hero-inner { grid-template-columns: 1fr; gap: 2rem; }
  .hero-text { order: 2; }
  .hero-image { order: 1; max-height: 50vh; }
  .hero { min-height: auto; padding-top: 5rem; }

  .modal-content { grid-template-columns: 1fr; }
  .modal-image { min-height: 280px; }

  section { padding: 3.5rem 1.5rem; }

  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
}

@media (max-width: 480px) {
  .gallery-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
  .painting-card .card-info { padding: 0.6rem 0.8rem; }
  .category-grid { grid-template-columns: 1fr; }
  .hero-text h1 { font-size: 2.2rem; }
}

/* --- Reveal animation --- */
.reveal {
  opacity: 0; transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <div class="nav-inner">
    <a href="#" class="logo" onclick="showPage('home')">Sveta Colours</a>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="#" onclick="showPage('home'); closeMenu()">Home</a></li>
      <li><a href="#" onclick="showPage('paintings'); closeMenu()">Paintings</a></li>
      <li><a href="#" onclick="showPage('postcards'); closeMenu()">Postcards</a></li>
      <li><a href="#" onclick="showPage('about'); closeMenu()">About</a></li>
      <li><a href="#contact" onclick="closeMenu()" class="nav-contact">Get in touch</a></li>
    </ul>
  </div>
</nav>

<div id="app"></div>

<!-- Painting Detail Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<footer>&copy; 2026 Sveta Colours. All rights reserved.</footer>

<script>
/* ========================================================
   FALLBACK DATA
   ======================================================== */
let PAINTINGS = [
  {
    id: 1,
    title: "Holding On in Winter",
    medium: "acrylic",
    price: 500,
    sold: false,
    size: "16 x 20 in",
    image: "",
    description: "A family stands as a point of warmth and color against towering high-rises and the cold air.",
    collections: ["Seasons", "City"],
    available: true,
    sold: false
  }
];

/* ========================================================
   CONFIGURATION
   ======================================================== */
const CONTACT_EMAIL = "sveta.colours@gmail.com";
const CURRENCY = "$";
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrJdmLlZeUwFysVsa6rmHiEnby2moRMSYcBEixMNb3AoLxdpnvrSaWlxC23TF68VMTV3UDuQbuWOXV/pub?output=csv";

/* ========================================================
   GOOGLE SHEET LOADER
   ======================================================== */

function parseCSV(text) {
  const rows = [];
  let current = '', inQuotes = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') inQuotes = false;
      else current += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(current.trim()); current = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
        row.push(current.trim());
        if (row.some(c => c !== '')) rows.push(row);
        row = []; current = '';
        if (ch === '\r') i++;
      } else current += ch;
    }
  }
  row.push(current.trim());
  if (row.some(c => c !== '')) rows.push(row);
  return rows;
}

function driveImageURL(raw) {
  if (!raw) return '';
  let match = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!match) match = raw.match(/id=([a-zA-Z0-9_-]+)/);
  if (!match) match = raw.match(/^([a-zA-Z0-9_-]{20,})$/);
  if (match) return `https://lh3.googleusercontent.com/d/${match[1]}`;
  if (raw.startsWith('http')) return raw;
  return '';
}

function sheetRowToPainting(row, headers, index) {
  const get = (name) => {
    const i = headers.findIndex(h => h.toLowerCase().replace(/[^a-z]/g,'') === name);
    return i >= 0 ? (row[i] || '') : '';
  };
  const priceStr = get('price');
  const soldStr = get('sold').toLowerCase();
  const availableStr = get('featured').toLowerCase();
  const available = availableStr === '' || availableStr === 'yes' || availableStr === 'true' || availableStr === '1';
  return {
    id: index + 1,
    title: get('title'),
    medium: get('medium').toLowerCase(),
    price: priceStr ? parseFloat(priceStr.replace(/[^0-9.]/g, '')) : null,
    sold: !available,
    size: get('size'),
    image: driveImageURL(get('image')),
    description: get('description'),
    collections: get('collection') ? get('collection').split(',').map(c => c.trim()).filter(Boolean) : [],
    available: available
  };
}

async function loadFromSheet() {
  if (!SHEET_CSV_URL) return;
  try {
    document.getElementById('app').innerHTML = `
      <div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
        <p style="color:var(--text-muted);font-family:var(--font-display);font-size:1.2rem;">Loading paintings…</p>
      </div>`;
    const response = await fetch(SHEET_CSV_URL);
    if (!response.ok) throw new Error('Could not fetch sheet');
    const text = await response.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('Sheet appears empty');
    const headers = rows[0].map(h => h.toLowerCase().replace(/[^a-z]/g,''));
    const paintings = rows.slice(1)
      .map((row, i) => sheetRowToPainting(row, headers, i))
      .filter(p => p.title);
    if (paintings.length > 0) PAINTINGS = paintings;
  } catch (err) {
    console.warn('Could not load from Google Sheet:', err.message);
  }
  render();
}

/* ========================================================
   APP ENGINE
   ======================================================== */

let currentPage = 'home';

function showPage(page) {
  currentPage = page;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function toggleMenu() { document.getElementById('navLinks').classList.toggle('open'); }
function closeMenu() { document.getElementById('navLinks').classList.remove('open'); }

function formatPrice(p) {
  if (p.sold) return '<span class="card-price sold">Sold</span>';
  return `<span class="card-price">${CURRENCY}${p.price}</span>`;
}

function placeholderGradient(id) {
  const grads = [
    'linear-gradient(145deg, #E8C4A0, #D4956B)',
    'linear-gradient(145deg, #C5CDD8, #A3B1C2)',
    'linear-gradient(145deg, #D4C9A8, #E8D5B0)',
    'linear-gradient(145deg, #8DA178, #B5C4A0)',
    'linear-gradient(145deg, #B8A9C2, #D0C5D8)',
    'linear-gradient(145deg, #D8C5B0, #E5D8C8)',
    'linear-gradient(145deg, #7C8FA3, #A3B1C2)',
    'linear-gradient(145deg, #D0D3CB, #E2E4DC)',
    'linear-gradient(145deg, #C9A29B, #D8B5AE)',
  ];
  return grads[id % grads.length];
}

function paintingImage(p, height) {
  if (p.image) return `<img src="${p.image}" alt="${p.title}" loading="lazy">`;
  return `<div style="width:100%;height:100%;min-height:${height||'100%'};background:${placeholderGradient(p.id)};display:flex;align-items:center;justify-content:center;"><span style="font-family:var(--font-display);font-size:1.1rem;color:rgba(28,23,18,0.18);text-align:center;padding:1rem;">${p.title}</span></div>`;
}

function cardHTML(p) {
  return `
    <div class="painting-card reveal" onclick="openModal(${p.id})">
      <div class="card-image">${paintingImage(p, '280px')}</div>
      <div class="card-title">${p.title}</div>
      <div class="card-medium">${p.medium}</div>
    </div>`;
}

function openModal(id) {
  const p = PAINTINGS.find(x => x.id === id);
  if (!p) return;
  const subject = encodeURIComponent(`Inquiry about "${p.title}"`);
  const statusClass = p.sold ? 'sold' : 'available';
  const statusText = p.sold ? 'Sold' : 'Available';
  const ctaBtn = p.sold ? ''
    : `<a href="mailto:${CONTACT_EMAIL}?subject=${subject}" class="btn btn-primary">Inquire about this painting</a>`;
  const collectionsHTML = (p.collections || []).length
    ? `<div style="margin-top:0.75rem;display:flex;flex-wrap:wrap;gap:0.5rem;">${(p.collections || []).map(c => `<span style="display:inline-block;padding:0.25rem 0.75rem;border-radius:999px;font-size:0.8rem;background:var(--surface-alt);color:var(--text-secondary);border:1px solid var(--border-soft);cursor:pointer;" onclick="closeModal();showPage('collection:${c}')">${c}</span>`).join('')}</div>`
    : '';

  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-image">${paintingImage(p, '400px')}</div>
    <div class="modal-details">
      <h2>${p.title}</h2>
      <p class="description">${p.description}</p>
      ${collectionsHTML}
      <div class="modal-meta">
        <span><span class="label">Size</span> ${p.size}</span>
        <span><span class="label">Medium</span> ${p.medium.charAt(0).toUpperCase() + p.medium.slice(1)}</span>
      </div>
      <div class="modal-status ${statusClass}">${statusText}</div>
      ${ctaBtn}
    </div>`;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

/* --- Page Renderers --- */

function renderHome() {
  const featured = PAINTINGS.filter(p => p.available).slice(0, 8);
  return `
    <section class="hero">
      <div class="hero-inner section-inner" style="padding:0 2rem;">
        <div class="hero-text">
          <h1>Original paintings<br>for your&nbsp;home</h1>
          <p class="subtitle">Light, color, and quiet atmosphere. Each piece is handmade — watercolor postcards and large acrylic works, made to bring warmth to the space they live in.</p>
          <div class="hero-buttons">
            <a href="#" class="btn btn-primary" onclick="showPage('collections')">Explore Collections</a>
            <a href="#" class="btn btn-outline" onclick="showPage('paintings')">View Available Works</a>
          </div>
        </div>
        <div class="hero-image">${featured[0] ? paintingImage(featured[0], '100%') : ''}</div>
      </div>
    </section>

    <section style="background:var(--surface);">
      <div class="section-inner">
        <div class="section-header">
          <div class="section-title">
            <h2>Featured works</h2>
            <p>A selection of recent available paintings.</p>
          </div>
        </div>
        <div class="gallery-grid" style="margin-top:2.5rem;">
          ${featured.map(cardHTML).join('')}
        </div>
      </div>
    </section>

    <section class="categories">
      <div class="section-inner">
        <div class="section-title"><h2>Browse by collection</h2></div>
        <div class="category-grid" style="margin-top:2rem;">
          ${getAllCollections().map(name => `
            <div class="category-card reveal" onclick="showPage('collection:${name}')" style="cursor:pointer;">
              <h3>${name}</h3>
              <p>${PAINTINGS.filter(p => (p.collections || []).includes(name)).length} paintings</p>
            </div>`).join('')}
        </div>
        <div style="text-align:center;margin-top:1.5rem;">
          <a href="#" class="btn-text" onclick="showPage('collections')">View all collections →</a>
        </div>
      </div>
    </section>

    <section>
      <div class="section-inner">
        <div class="section-title"><h2>About the artist</h2></div>
        <div class="about-preview reveal">
          <p>I paint to capture the quiet moments — the way light falls on a surface, the mood of a still afternoon. My work lives between watercolor and acrylic, between softness and depth.</p>
          <p>Each painting is an original, made with care and attention to atmosphere.</p>
          <a href="#" class="btn-text" onclick="showPage('about')">Read more →</a>
        </div>
      </div>
    </section>

    <section class="contact" id="contact">
      <div class="section-inner">
        <div class="section-title" style="text-align:center;"><h2>Get in touch</h2></div>
        <p>Interested in a painting? I'd love to hear from you.</p>
        <a href="mailto:${CONTACT_EMAIL}" class="email-link">${CONTACT_EMAIL}</a>
      </div>
    </section>`;
}

function getAllCollections() {
  const set = new Set();
  PAINTINGS.forEach(p => (p.collections || []).forEach(c => set.add(c)));
  return Array.from(set).sort();
}

function renderPaintings() {
  const available = PAINTINGS.filter(p => !p.sold);
  return `
    <div class="collection-header">
      <a href="#" class="back-link" onclick="showPage('home')">← Back to Home</a>
      <h1>Paintings</h1>
      <p>All available original works</p>
    </div>
    <section style="padding-top:1rem;">
      <div class="section-inner">
        <div class="gallery-grid">
          ${available.length ? available.map(cardHTML).join('') : '<p style="text-align:center;color:var(--text-muted);">No available paintings at the moment.</p>'}
        </div>
      </div>
    </section>
    <section class="contact" id="contact">
      <div class="section-inner">
        <div class="section-title" style="text-align:center;"><h2>Get in touch</h2></div>
        <p>Interested in a painting? I'd love to hear from you.</p>
        <a href="mailto:${CONTACT_EMAIL}" class="email-link">${CONTACT_EMAIL}</a>
      </div>
    </section>`;
}

function renderPostcards() {
  const postcards = PAINTINGS.filter(p => p.medium === 'watercolor');
  return `
    <div class="collection-header">
      <a href="#" class="back-link" onclick="showPage('home')">← Back to Home</a>
      <h1>Postcards</h1>
      <p>Seasonal watercolor postcards — soft, light, atmospheric</p>
    </div>
    <section style="padding-top:1rem;">
      <div class="section-inner">
        <div class="gallery-grid">
          ${postcards.length ? postcards.map(cardHTML).join('') : '<p style="text-align:center;color:var(--text-muted);">No postcards yet — coming soon!</p>'}
        </div>
      </div>
    </section>
    <section class="contact" id="contact">
      <div class="section-inner">
        <div class="section-title" style="text-align:center;"><h2>Get in touch</h2></div>
        <p>Interested in a painting? I'd love to hear from you.</p>
        <a href="mailto:${CONTACT_EMAIL}" class="email-link">${CONTACT_EMAIL}</a>
      </div>
    </section>`;
}

function renderCollections() {
  const names = getAllCollections();
  return `
    <div class="collection-header">
      <a href="#" class="back-link" onclick="showPage('home')">← Back to Home</a>
      <h1>Collections</h1>
      <p>Browse paintings by mood, light, and atmosphere</p>
    </div>
    <section style="padding-top:1rem;">
      <div class="section-inner">
        <div class="category-grid">
          ${names.length ? names.map(name => {
            const count = PAINTINGS.filter(p => (p.collections || []).includes(name)).length;
            const sample = PAINTINGS.find(p => (p.collections || []).includes(name));
            return `
              <div class="category-card reveal" onclick="showPage('collection:${name}')" style="cursor:pointer;position:relative;overflow:hidden;min-height:180px;">
                ${sample && sample.image ? `<div style="position:absolute;inset:0;opacity:0.15;">${paintingImage(sample,'100%')}</div>` : ''}
                <div style="position:relative;z-index:1;">
                  <h3>${name}</h3>
                  <p>${count} painting${count !== 1 ? 's' : ''}</p>
                </div>
              </div>`;
          }).join('') : '<p style="text-align:center;color:var(--text-muted);">No collections defined yet.</p>'}
        </div>
      </div>
    </section>
    <section class="contact" id="contact">
      <div class="section-inner">
        <div class="section-title" style="text-align:center;"><h2>Get in touch</h2></div>
        <p>Interested in a painting? I'd love to hear from you.</p>
        <a href="mailto:${CONTACT_EMAIL}" class="email-link">${CONTACT_EMAIL}</a>
      </div>
    </section>`;
}

function renderCollectionDetail(name) {
  const items = PAINTINGS.filter(p => (p.collections || []).includes(name));
  return `
    <div class="collection-header">
      <a href="#" class="back-link" onclick="showPage('collections')">← Back to Collections</a>
      <h1>${name}</h1>
      <p>${items.length} painting${items.length !== 1 ? 's' : ''} in this collection</p>
    </div>
    <section style="padding-top:1rem;">
      <div class="section-inner">
        <div class="gallery-grid">
          ${items.length ? items.map(cardHTML).join('') : '<p style="text-align:center;color:var(--text-muted);">No paintings in this collection yet.</p>'}
        </div>
      </div>
    </section>
    <section class="contact" id="contact">
      <div class="section-inner">
        <div class="section-title" style="text-align:center;"><h2>Get in touch</h2></div>
        <p>Interested in a painting? I'd love to hear from you.</p>
        <a href="mailto:${CONTACT_EMAIL}" class="email-link">${CONTACT_EMAIL}</a>
      </div>
    </section>`;
}

function renderAbout() {
  return `
    <div class="collection-header">
      <a href="#" class="back-link" onclick="showPage('home')">← Back to Home</a>
      <h1>About</h1>
    </div>
    <section style="padding-top:0;">
      <div class="section-inner about-full reveal">
        <p>I'm Sveta, and I paint because color and light are my language. There's something about the way a wash of watercolor catches the page, or the way acrylic builds texture and depth, that words can't quite reach.</p>
        <p>My subjects are often quiet — landscapes, still lifes, moments of calm. I want each painting to bring a sense of warmth and peace to the room it lives in.</p>
        <p>Every piece here is an original, painted by hand. If something catches your eye, I'd love to hear from you.</p>
      </div>
    </section>
    <section class="contact" id="contact">
      <div class="section-inner">
        <div class="section-title" style="text-align:center;"><h2>Get in touch</h2></div>
        <p>Interested in a painting? I'd love to hear from you.</p>
        <a href="mailto:${CONTACT_EMAIL}" class="email-link">${CONTACT_EMAIL}</a>
      </div>
    </section>`;
}

function render() {
  const app = document.getElementById('app');
  if (currentPage.startsWith('collection:')) {
    app.innerHTML = renderCollectionDetail(currentPage.split(':').slice(1).join(':'));
  } else switch (currentPage) {
    case 'paintings':    app.innerHTML = renderPaintings(); break;
    case 'postcards':    app.innerHTML = renderPostcards(); break;
    case 'collections':  app.innerHTML = renderCollections(); break;
    case 'about':        app.innerHTML = renderAbout(); break;
    default:             app.innerHTML = renderHome(); break;
  }
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 60);
    });
  });
}

// Boot
if (SHEET_CSV_URL) loadFromSheet();
else render();
</script>
</body>
</html>
