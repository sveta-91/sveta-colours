================================================================
ROUND 6 — LAYOUT, ACCESSIBILITY, CURATION, COPY
================================================================

LAYOUT / VISUAL
L1. Hero takes the shape of the painting itself. Fixed 75vh +
    object-fit:contain (which left huge empty bands above and
    below landscape works) replaced with aspect-ratio:
    var(--hero-ratio). --hero-ratio is set pre-paint from
    widthIn/heightIn in the Sheet (correct on first render),
    refined post-onload only if natural dims diverge by >5%
    (avoids CLS for the common case). object-fit reverted to
    cover. max-height: 88vh clamps tall portraits; min-height:
    380px keeps tiny images from collapsing.
L2. Gallery card images switched from object-fit:cover to
    contain. The aspect ratio already matches the painting, but
    contain is the safer failsafe: if --ratio hasn't been set
    yet (placeholder, pre-onload), the painting still shows
    fully — no edge crop. Bone-coloured background fills any
    surrounding strip.
L3. Vertical gap restored to the gallery grid. Was gap:0
    horizontal + per-card margin-bottom:3rem, which got
    swallowed by the masonry span rounding and caused rows to
    drift apart. Now: gap: 3rem 2.5rem (vertical 3rem,
    horizontal 2.5rem), no per-card margin.
L4. Removed the "grid-row: span 60" pre-masonry fallback (gave
    every card a fat 480px placeholder before JS ran). Until
    masonry-ready, grid-auto-rows is `auto` so cards naturally
    take the height their --ratio asks for. masonry-ready then
    switches to 8px rows so span-of-N maths work.
L5. CLS minimised: --ratio (cards) and --hero-ratio (hero) are
    set inline from widthIn/heightIn at render time. The img
    onload only writes the ratio when natural dims differ from
    the current container ratio by more than 5%. For Sheet rows
    with accurate dimensions, the onload is a no-op.

TECH / ACCESSIBILITY BUG FIXES
B1. Hero is now a real <button> when there's a painting to
    open. The old `onclick="${...||''}"` rendered an empty
    onclick attribute when heroPiece was null, was not
    keyboard-accessible, and had no role/aria-label. New
    button.hero-image-wrap CSS strips default button chrome;
    when no painting, we render a plain non-interactive div.
B2. Custom-cursor mousemove handler throttled through
    requestAnimationFrame. Single transform write per frame;
    .visible toggles opacity only. CSS lost its transform on
    .visible and the JS now owns position+scale entirely.
B3. CSS counter for catalog numbers removed (it polluted
    screen-reader output via ::before). Replaced with a real
    <span class="card-number" aria-hidden="true"> inside each
    card. SR users hear the title, not "Number 01 ...".
B4. og:url corrected to https://www.sveta-colours.com/ (was
    svetacolours.com without the hyphen). Added matching
    <link rel="canonical">. Person JSON-LD url updated too.
B5. Global catalog number per painting. assignCatalogNumbers()
    stamps each painting's `catalogNumber` once on load (Sheet
    index +1). The hero, the card-number span, and the custom
    cursor "View №NN" all read from p.catalogNumber, so the
    same painting reads the same № on /home, /works, /past,
    and inside the cursor.

CURATION
C1. Featured grid algorithm: selectFeatured(paintings, count=8,
    excludeHeroId). (1) Pin up to 4 paintings flagged featured,
    excluding hero, excluding sold. (2) Fill from
    available/!sold/has-image in Sheet order. (3) Last-resort
    fill from any remaining available pieces. (4) Anti-cluster:
    split by orientation (ratio>1 = landscape, ≤1 = portrait),
    zip-merge starting with the larger bucket so we never get
    three portraits or three landscapes in a row.
C2. /works is now available-only — sold pieces moved to /past
    (which sorts by year desc, then by Sheet order for years-
    missing). /works adds a "See past work (N)" link when
    there's any. Sold tag stays out of /works cards.
C3. Hero pickup never picks a sold piece. New priority:
    featured && available && !sold && image → available &&
    !sold && image → available && !sold → first.
C4. Sold cards drop the price entirely (art-critic note: a
    struck-through "$500 Sold" reads as Shopify). Cards now
    show "Sold" italic tag next to the title and no price.
    The struck-through price is retained inside the modal,
    where it informs.

MODAL
M1. Description hard-capped to first 2 sentences OR 240 chars
    (whichever is shorter) via truncateDescription(). Ellipsis
    when trimmed.
M2. Meta table split: primary fields (Size, Medium, Year,
    Signed) always visible; secondary fields (Framing, Ships
    from, Authenticity) collapsed into a <details>Details</>
    block. Keeps the primary scan tight.
M3. Mobile modal image: replaced fixed min-height: 280px /
    max-height: 50vh with aspect-ratio: var(--ratio) +
    min-height: 240px / max-height: 70vh. Paintings get real
    height on phones.
M4. paintingMeta() no longer appends a trailing dot. Switched
    separator from ". " to " · " for an editorial credit-line
    feel ("Acrylic on canvas · 2024 · 16 × 20 in / 40.6 × 50.8
    cm").

COPY
T1. Modal CTA note: "Typical reply within 24 hours · Worldwide

T2. Sold message in modal: "This piece has found a home. Write
