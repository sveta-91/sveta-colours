<style>
/* ========================================================
   SVETA COLOURS — V2 EDITORIAL GALLERY DESIGN
   ========================================================
   Palette: bone/oat with a single deep ink-blue accent.
   Rationale: rose-dust + clay + terracotta together read
   too "warm-craft / Etsy". Bone (#EAE6DE) is a classic
   gallery wall tone; ink-blue (#1A2640) gives a single,
   restrained editorial accent — used only for links and
   the rare CTA. Sold and Available no longer have
   competing colors; "Sold" is just italic strikethrough.
   ======================================================== */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Editorial bone/oat palette */
  --bg: #EAE6DE;
  --surface: #F2EFE8;
  --surface-alt: #E0DBD1;
  --paper: #F7F5EF;
  --border: #D6CFC1;
  --border-strong: #BFB6A4;
  --hairline: rgba(20, 19, 15, 0.12);

  --text: #14130F;
  --text-secondary: #3B362D;
  --text-muted: #6B6357;
  /* Darkened from #8C8478 to pass WCAG AA on bone (#EAE6DE) — 4.6:1 contrast */
  --text-faint: #6B6258;

  /* Single accent: deep ink-blue */
  --accent: #1A2640;
  --accent-hover: #2A3A5C;

  /* Dynamic accent tint applied by JS from dominant painting color.
     Falls back to accent. */
  --accent-tint: #1A2640;

  /* Type */
  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body: 'Inter', system-ui, -apple-system, sans-serif;

  /* Layout */
  --max-w: 1280px;
  --max-w-text: 680px;
  --transition: 0.28s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "ss02";
}

::selection { background: var(--accent); color: var(--paper); }

img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }

/* Focus states */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
  border-radius: 2px;
}

/* --- Navigation --- */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(234, 230, 222, 0.86);
  backdrop-filter: blur(14px) saturate(1.1);
  -webkit-backdrop-filter: blur(14px) saturate(1.1);
  border-bottom: 1px solid var(--hairline);
}

nav .nav-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 2rem;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

nav .logo {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.4rem;
  font-weight: 400;
  letter-spacing: -0.005em;
  color: var(--text);
  font-optical-sizing: auto;
}

nav .nav-links { display: flex; gap: 2.2rem; list-style: none; align-items: center; }

nav .nav-links a {
  font-size: 0.84rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--text-secondary);
  transition: color var(--transition);
  position: relative;
}

nav .nav-links a:hover { color: var(--text); }

nav .nav-links a.active::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -6px;
  height: 1px;
  background: var(--text);
}

.hamburger {
  display: none;
  background: none;
  border: none;
  width: 26px;
  height: 18px;
  flex-direction: column;
  justify-content: space-between;
  padding: 0;
}

.hamburger span {
  display: block; width: 100%; height: 1px;
  background: var(--text);
  transition: var(--transition);
}

/* --- Buttons / Links --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  padding: 0 1.4rem;
  border: none;
  border-radius: 4px;
  font-family: var(--font-body);
  font-size: 0.86rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: all var(--transition);
}

.btn-primary {
  background: var(--accent);
  color: var(--paper);
}
.btn-primary:hover { background: var(--accent-hover); }

.btn-outline {
  background: transparent;
  border: 1px solid var(--border-strong);
  color: var(--text);
}
.btn-outline:hover { border-color: var(--text); }

/* Editorial text link: underline with offset */
.link {
  color: var(--text);
  text-decoration: underline;
  text-decoration-color: var(--text-muted);
  text-decoration-thickness: 1px;
  text-underline-offset: 4px;
  transition: text-decoration-color var(--transition), color var(--transition);
  font-size: 0.92rem;
}
.link:hover { text-decoration-color: var(--text); }

.link-accent {
  color: var(--accent);
  text-decoration: underline;
  text-decoration-color: var(--accent);
  text-decoration-thickness: 1px;
  text-underline-offset: 4px;
}
.link-accent:hover { color: var(--accent-hover); text-decoration-color: var(--accent-hover); }

.link-arrow::after {
  content: ' \2192';
  display: inline-block;
  transition: transform var(--transition);
}
.link-arrow:hover::after { transform: translateX(3px); }

/* --- Sections --- */
section { padding: 6rem 2rem; }

.section-inner {
  max-width: var(--max-w);
  margin: 0 auto;
}

.section-title {
  margin-bottom: 3rem;
  border-top: 1px solid var(--hairline);
  padding-top: 2rem;
  display: flex;
  align-items: baseline;
  gap: 2rem;
  justify-content: space-between;
  flex-wrap: wrap;
}

.section-title .eyebrow {
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.section-title h2 {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 400;
  line-height: 1.02;
  letter-spacing: -0.015em;
  color: var(--text);
  flex: 1;
  min-width: 0;
}

.section-title .section-meta {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* --- Hero (editorial full-bleed) --- */
.hero {
  padding: 0;
  position: relative;
  margin-top: 68px;
}

/* Hero takes the shape of the painting itself.
   We constrain HEIGHT (not max-height) and let aspect-ratio derive width,
   so a portrait painting renders tall-and-narrow centered, with page-bg
   margins on the sides, instead of being cropped landscape. max-width:100%
   prevents overflow on narrow viewports (mobile portrait paintings then
   become width-bounded, aspect-ratio recomputes height). object-fit:contain
   is the safety net: even if box and ratio ever desync, the painting is
   never cropped. Background is page-bg so the margins read as page, not
   as a tinted frame around the work. */
.hero-image-wrap {
  width: auto;
  height: 72vh;
  max-width: 100%;
  min-height: 380px;
  aspect-ratio: var(--hero-ratio, 4/5);
  background: var(--bg);
  position: relative;
  overflow: hidden;
  margin: 0 auto;
}

.hero-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
}

/* Hero rendered as an interactive button when a painting is present;
   strip default button chrome so it visually matches the painting frame. */
button.hero-image-wrap {
  display: block;
  border: 0;
  padding: 0;
  font: inherit;
  color: inherit;
  text-align: inherit;
  cursor: pointer;
}

.hero-image-wrap .hero-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, #d6cfc1, #bfb6a4);
}

.hero-meta {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 2.5rem 2rem 4.5rem;
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 3rem;
  align-items: end;
}

.hero-title {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-variation-settings: "opsz" 144;
  font-size: clamp(3.4rem, 9vw, 8rem);
  font-weight: 400;
  line-height: 0.92;
  letter-spacing: -0.035em;
  color: var(--text);
  margin: 0;
}

.hero-title em,
.hero-title .italic {
  font-style: italic;
  color: var(--text-secondary);
}

.hero-side {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  padding-bottom: 0.5rem;
}

.hero-credit {
  font-family: var(--font-body);
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.hero-credit .sep { margin: 0 0.5rem; color: var(--text-faint); }
/* Social-proof line sits under the painting credit. Same uppercase rhythm
   so they read as one block, but de-emphasized so the painting credit
   leads visually. */
.hero-credit .hero-credit-stat { color: var(--text-faint); }

.hero-tagline {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.15rem;
  line-height: 1.45;
  color: var(--text-secondary);
  max-width: 36ch;
}

.hero-cta-row {
  margin-top: 0.5rem;
}

/* --- Gallery Grid: CSS Grid masonry (left-to-right reading order) --- */
/* Row height is fixed at 8px from page-load; each card carries an inline
   `grid-row: span N` seeded at render time from its aspect ratio, then
   refined post-image-load by computeMasonry(). No auto→8px swap, no FOUC. */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  grid-auto-rows: 8px;
  gap: 4rem 2.75rem;
  position: relative;
}

@media (max-width: 1024px) {
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 3.25rem 2rem; }
}
@media (max-width: 600px)  {
  .gallery-grid { grid-template-columns: 1fr; gap: 3.5rem 0; }
}

/* Editorial size-chapter heading on /works. Two sections — large 16×20 and
   small 11×14 — each preceded by this label so the page reads as two rooms
   instead of one flat 11-painting feed. Display-italic + hairline rule. */
.hang-chapter {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.1rem;
  font-weight: 400;
  letter-spacing: 0.01em;
  color: var(--text-muted);
  margin: 4rem 0 1.5rem;
  padding-top: 2rem;
  border-top: 1px solid var(--hairline);
}
.hang-chapter:first-child {
  margin-top: 0;
  padding-top: 0;
  border-top: none;
}

/* 11×14 inset — Designer's real-world-scale cue without a S/M chip. The
   smaller painting size renders at 85% of the column width, centered, so
   the eye registers it as physically smaller on the wall. Title + meta +
   price stay at full column width below. */
.painting-card[data-size="small"] .card-image {
  width: 85%;
  margin: 0 auto;
}

.painting-card {
  width: 100%;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  text-align: left;
  position: relative;
  display: block;
  color: inherit;
  text-decoration: none;
}

.painting-card .card-image {
  width: 100%;
  background: transparent;
  overflow: hidden;
  padding-bottom: 0.9rem;
  border-bottom: 1px solid var(--hairline);
  transition: transform 0.3s ease;
  /* no border-radius — gallery editorial */
}

.painting-card .card-image-inner {
  width: 100%;
  aspect-ratio: var(--ratio, 4/5);
  /* Frame box reads as page background (chromatic-insulation move from R1.5
     designer notes): the painting's own colors then carry the contrast,
     instead of fighting a tinted bone wash behind every image.
     --surface-alt stays on the <img> below as the pre-load placeholder so
     the card area isn't a bright bg flash during image fetch. */
  background: var(--bg);
  overflow: hidden;
  position: relative;
}

.painting-card .card-image img {
  width: 100%; height: 100%;
  /* contain is a failsafe: if --ratio is stale (placeholder, pre-onload),
     we never crop the artwork. background bone shows around the edges. */
  object-fit: contain;
  background: var(--surface-alt);
}

.painting-card:hover .card-image { transform: translateY(-2px); }
.painting-card:hover .card-title {
  color: var(--accent);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 0.2em;
}

/* Override the .reveal stagger (opacity:0; translateY(14px)) when a card is
   keyboard-focused mid-stagger — otherwise the focus ring sits 14px below
   the card's eventual position and looks broken. Global :focus-visible
   (top of file) supplies the outline; this rule snaps position+opacity
   to final values with no transition, so the focused card lands instantly. */
.painting-card:focus-visible {
  opacity: 1 !important;
  transform: none !important;
  transition: none !important;
}

/* Sold cards keep full visual presence — the "Sold" label in the price
   slot (and the modal) carries the status. Earlier we dimmed sold cards
   to opacity 0.7 to make the eye land on available pieces first, but it
   read as a blur and undersold the work itself. The .is-sold class stays
   on the card as a semantic hook for any future modal/aria treatment. */

.painting-card .card-info {
  padding: 1.35rem 0 0;
  display: block;
}

.painting-card .card-text { min-width: 0; }

.painting-card .card-title {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: 1.4rem;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.2;
  color: var(--text);
  margin-bottom: 0.25rem;
  transition: color 0.2s ease;
}

.painting-card .card-meta {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.86rem;
  letter-spacing: 0.005em;
  color: var(--text-muted);
  line-height: 1.45;
}

/* Price slot sits below meta as a quiet caption-plate line. Uniform $400
   across the available inventory means this is layout-rhythm, not signal —
   kept whisper-weight on purpose. Sold pieces fill the same slot with the
   word "Sold" so the card geometry doesn't shift between states. */
.painting-card .card-price {
  display: block;
  margin-top: 0.4rem;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.88rem;
  line-height: 1.45;
  color: var(--text-faint);
  position: relative;
}
.painting-card .card-price--sold {
  color: var(--text-faint);
}
/* --- Category cards --- */
.categories { background: var(--surface); }

.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 0;
  border-top: 1px solid var(--hairline);
}

.category-card {
  padding: 2.5rem 2rem;
  background: transparent;
  border-right: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  cursor: pointer;
  transition: background var(--transition);
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  min-height: 200px;
  justify-content: space-between;
}

.category-card:hover { background: var(--paper); }

.category-card h3 {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: 1.8rem;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.05;
}

.category-card .cat-count {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.92rem;
  color: var(--text-muted);
}

.category-card .cat-arrow {
  margin-top: 1.5rem;
  font-size: 0.82rem;
  letter-spacing: 0.06em;
  color: var(--text-muted);
}

/* --- About preview --- */
.about-preview {
  max-width: var(--max-w-text);
}

.about-preview p {
  font-family: var(--font-display);
  font-size: 1.3rem;
  line-height: 1.5;
  color: var(--text);
  margin-bottom: 1rem;
  font-weight: 400;
  letter-spacing: -0.005em;
}

.about-preview p + p {
  font-size: 1.05rem;
  color: var(--text-secondary);
  font-family: var(--font-body);
  line-height: 1.7;
}

/* --- Testimonials --- */
.testimonials { background: var(--paper); }

.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4rem;
  margin-top: 2rem;
}

.testimonial blockquote {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.2rem;
  line-height: 1.5;
  color: var(--text);
  letter-spacing: -0.005em;
  margin-bottom: 1.25rem;
  position: relative;
}

.testimonial blockquote::before {
  content: '\201C';
  position: absolute;
  left: -0.8rem;
  top: -0.4rem;
  font-size: 2rem;
  color: var(--text-faint);
  font-style: italic;
}

.testimonial cite {
  font-family: var(--font-body);
  font-style: normal;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

@media (max-width: 900px) {
  .testimonials-grid { grid-template-columns: 1fr; gap: 3rem; }
}

/* --- Process / Studio --- */
.process-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
}

.process-image {
  aspect-ratio: 4/5;
  background: var(--surface-alt);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.95rem;
  text-align: center;
  padding: 2rem;
}

.process-text p {
  font-family: var(--font-body);
  font-size: 1.02rem;
  line-height: 1.75;
  color: var(--text-secondary);
  margin-bottom: 1rem;
}

.process-text p:first-child {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-style: italic;
  color: var(--text);
  line-height: 1.45;
  margin-bottom: 1.25rem;
}

@media (max-width: 900px) {
  .process-grid { grid-template-columns: 1fr; gap: 2.5rem; }
  .process-image { aspect-ratio: 3/2; }
}

/* --- FAQ (details/summary) --- */
.faq-list {
  max-width: var(--max-w-text);
  margin: 0 auto;
}

.faq-list details {
  border-bottom: 1px solid var(--hairline);
  padding: 1.4rem 0;
}

.faq-list details:first-child { border-top: 1px solid var(--hairline); }

.faq-list summary {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: 1.2rem;
  font-weight: 400;
  letter-spacing: -0.005em;
  color: var(--text);
  cursor: pointer;
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}

.faq-list summary::-webkit-details-marker { display: none; }

.faq-list summary::after {
  content: '+';
  font-family: var(--font-body);
  font-size: 1.4rem;
  font-weight: 300;
  color: var(--text-muted);
  transition: transform var(--transition);
  flex-shrink: 0;
}

.faq-list details[open] summary::after { content: '\2013'; }

.faq-list .faq-answer {
  padding-top: 1rem;
  font-size: 0.98rem;
  line-height: 1.7;
  color: var(--text-secondary);
  max-width: 60ch;
}

/* --- Exhibitions --- */
.exhibitions-list {
  border-top: 1px solid var(--hairline);
  max-width: 800px;
}

.exhibitions-list .exh-row {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 2rem;
  padding: 1.2rem 0;
  border-bottom: 1px solid var(--hairline);
  align-items: baseline;
}

.exhibitions-list .exh-year {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1rem;
  color: var(--text-muted);
}

.exhibitions-list .exh-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--text);
}

.exhibitions-list .exh-location {
  font-family: var(--font-body);
  font-size: 0.88rem;
  color: var(--text-muted);
  letter-spacing: 0.03em;
}

.exhibitions-empty {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--text-muted);
  padding: 2rem 0;
}

/* --- Newsletter --- */
.newsletter { background: var(--surface); }

.newsletter-inner {
  max-width: var(--max-w-text);
  margin: 0 auto;
  text-align: center;
}

.newsletter h2 {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  font-weight: 400;
  letter-spacing: -0.015em;
  line-height: 1.05;
  margin-bottom: 0.75rem;
}

.newsletter p {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--text-muted);
  margin-bottom: 2rem;
  font-size: 1.05rem;
}

.newsletter form {
  display: flex;
  gap: 1.5rem;
  max-width: 480px;
  margin: 0 auto;
  align-items: flex-end;
}

.newsletter .field {
  flex: 1;
  position: relative;
}

.newsletter label {
  display: block;
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  text-align: left;
}

.newsletter input[type="email"] {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border-strong);
  padding: 0.5rem 0;
  font-family: var(--font-body);
  font-size: 1rem;
  color: var(--text);
  transition: border-color var(--transition);
}

.newsletter input[type="email"]:focus {
  outline: none;
  border-bottom-color: var(--text);
}

.newsletter button {
  background: none;
  border: none;
  border-bottom: 1px solid var(--text);
  padding: 0.5rem 0;
  font-family: var(--font-body);
  font-size: 0.92rem;
  letter-spacing: 0.04em;
  color: var(--text);
  white-space: nowrap;
}

.newsletter button:hover { color: var(--accent); border-bottom-color: var(--accent); }

@media (max-width: 600px) {
  .newsletter form { flex-direction: column; align-items: stretch; }
  .newsletter button { width: fit-content; margin: 0 auto; }
}

/* --- Contact (single section) --- */
.contact { background: var(--bg); padding-top: 5rem; padding-bottom: 5rem; }

.contact-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3rem;
  align-items: end;
}

.contact h2 {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: clamp(2rem, 5vw, 3.4rem);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 0.98;
}

.contact h2 em, .contact h2 .italic { font-style: italic; }

.contact-meta {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.05rem;
  color: var(--text-muted);
  line-height: 1.5;
}

.contact-meta a { color: var(--text); text-decoration: underline; text-underline-offset: 4px; }
.contact-meta a:hover { color: var(--accent); }

@media (max-width: 768px) {
  .contact-inner { grid-template-columns: 1fr; gap: 1.5rem; }
}

/* --- Collection Header --- */
.collection-header {
  padding: 9rem 2rem 3rem;
  max-width: var(--max-w);
  margin: 0 auto;
}

.collection-header h1 {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-variation-settings: "opsz" 144;
  font-size: clamp(2.6rem, 6vw, 4.4rem);
  font-weight: 400;
  letter-spacing: -0.025em;
  line-height: 0.98;
  margin-bottom: 0.6rem;
}

.collection-header p {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--text-muted);
  font-size: 1.05rem;
  max-width: 52ch;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  color: var(--text-muted);
  font-size: 0.84rem;
  letter-spacing: 0.04em;
  margin-bottom: 1.75rem;
  transition: color var(--transition);
}
.back-link:hover { color: var(--text); }

/* --- Detail Modal --- */
.modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(20, 19, 15, 0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  overflow-y: auto;
  padding: 2rem;
}

.modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

.modal {
  background: var(--paper);
  border-radius: 0;
  max-width: 1080px;
  width: 100%;
  margin: 3rem auto;
  overflow: hidden;
  box-shadow: 0 18px 64px rgba(0,0,0,0.18);
  animation: modalIn 0.32s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-close {
  position: absolute;
  top: 0.6rem; right: 0.6rem;
  background: rgba(247, 245, 239, 0.92);
  border: 1px solid var(--hairline);
  font-size: 1.4rem;
  color: var(--text-muted);
  z-index: 10;
  line-height: 1;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  transition: color var(--transition), background var(--transition);
  border-radius: 999px;
}
.modal-close:hover { color: var(--text); background: var(--paper); }

.modal-content {
  position: relative;
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(280px, 380px);
}

.modal-image {
  background: var(--surface-alt);
  min-height: 480px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-image img {
  width: 100%;
  height: 100%;
  max-height: 80vh;
  object-fit: contain;
}

.modal-details {
  padding: 2.5rem 2.25rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  overflow-y: auto;
  max-height: 80vh;
}

.modal-details h2 {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: 1.9rem;
  font-weight: 400;
  letter-spacing: -0.015em;
  line-height: 1.05;
  margin-bottom: 0.3rem;
}

.modal-details .modal-sub {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1rem;
  color: var(--text-muted);
  margin-bottom: 1.5rem;
}

.modal-details .description {
  color: var(--text-secondary);
  margin-bottom: 1.5rem;
  line-height: 1.7;
  font-size: 0.96rem;
}

.modal-meta {
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  margin-bottom: 1.5rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--hairline);
  font-size: 0.9rem;
}

.modal-meta .row {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 1rem;
  align-items: baseline;
}

.modal-meta .label {
  color: var(--text-muted);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.modal-meta .value {
  color: var(--text);
  font-size: 0.94rem;
  /* Keep meta values (especially "16 × 20 in / 40.6 × 50.8 cm") on a
     single line — the natural break points around `/` and the unit caused
     the size string to wrap "cm" onto a stray second line. At very narrow
     viewports the mobile media query stacks the row so the full value
     gets the full container width. */
  white-space: nowrap;
}

.modal-price {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-style: italic;
  color: var(--text);
  margin-bottom: 1rem;
  position: relative;
  display: inline-block;
}

.modal-price.sold {
  color: var(--text-muted);
}

/* Modal overlay accent border + tinted bg when JS samples a dominant color */
.modal {
  border-top: 2px solid var(--accent-tint);
  transition: border-color 0.4s ease;
}

.modal-cta {
  margin-top: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
}

.modal-cta .cta-link {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.15rem;
  color: var(--accent);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 5px;
  transition: color var(--transition);
}
.modal-cta .cta-link:hover { color: var(--accent-hover); }

.modal-cta .cta-note {
  font-size: 0.78rem;
  color: var(--text-muted);
  letter-spacing: 0.02em;
  line-height: 1.6;
}

.modal-collections {
  margin-top: 1rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.modal-collections .chip {
  font-family: var(--font-body);
  font-size: 0.74rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.3rem 0.7rem;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--transition);
}
.modal-collections .chip:hover { border-color: var(--text); color: var(--text); }

/* Expandable "Details" block under the modal meta table.
   Holds the secondary fields (framing, ships from, certificate) so the
   primary meta stays focused: size, medium, year, signed. */
.modal-extra {
  margin-top: 0.25rem;
  margin-bottom: 1.5rem;
  border-top: 1px solid var(--hairline);
}
.modal-extra summary {
  font-family: var(--font-body);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  padding: 0.9rem 0;
  cursor: pointer;
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-extra summary::-webkit-details-marker { display: none; }
.modal-extra summary::after {
  content: '+';
  font-size: 1.1rem;
  line-height: 1;
  color: var(--text-muted);
  transition: transform var(--transition);
}
.modal-extra[open] summary::after { content: '\2013'; }
.modal-extra .modal-meta {
  margin: 0 0 1rem;
  padding-top: 0;
  border-top: none;
}

/* --- About Full --- */
.about-full { max-width: var(--max-w-text); margin: 0 auto; }

.about-full .lede {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: 1.6rem;
  line-height: 1.4;
  letter-spacing: -0.01em;
  color: var(--text);
  margin-bottom: 2rem;
}

.about-full p {
  font-family: var(--font-body);
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--text-secondary);
  margin-bottom: 1.2rem;
}

/* --- Footer (editorial multi-column) --- */
footer {
  background: var(--bg);
  border-top: 1px solid var(--hairline);
  padding: 4rem 2rem 1.75rem;
  color: var(--text-secondary);
  font-size: 0.86rem;
}

.footer-inner {
  max-width: var(--max-w);
  margin: 0 auto;
}

.footer-grid {
  display: grid;
  /* Asymmetric column ratios — brand widest, browse/studio narrow, newsletter wide */
  grid-template-columns: 3fr 1fr 1fr 2fr;
  gap: 3rem;
  margin-bottom: 3rem;
}

/* If newsletter is hidden we want the brand col to take the slack */
.footer-grid.no-newsletter {
  grid-template-columns: 3fr 1fr 1fr;
}

.footer-col h4 {
  font-family: var(--font-body);
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 1rem;
  font-weight: 500;
}

.footer-col .footer-mark {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 0.4rem;
}

.footer-col .footer-tagline {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--text-muted);
  font-size: 0.98rem;
  line-height: 1.5;
}

.footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }

.footer-col ul a {
  color: var(--text-secondary);
  font-size: 0.9rem;
  transition: color var(--transition);
}

.footer-col ul a:hover { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }

.footer-bottom {
  border-top: 1px solid var(--hairline);
  padding-top: 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
  font-size: 0.78rem;
  color: var(--text-muted);
  letter-spacing: 0.03em;
}

@media (max-width: 900px) {
  .footer-grid { grid-template-columns: 1fr 1fr; gap: 2.5rem; }
}

@media (max-width: 540px) {
  .footer-grid { grid-template-columns: 1fr; gap: 2rem; }
}

/* --- Responsive (mobile-first refinements) --- */
@media (max-width: 1024px) {
  .hero-meta { grid-template-columns: 1fr; gap: 1.5rem; padding-bottom: 3.5rem; }
  .hero-side { align-items: flex-start; }
}

@media (max-width: 768px) {
  .hamburger { display: flex; }

  nav .nav-links {
    display: none;
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: rgba(234, 230, 222, 0.98);
    backdrop-filter: blur(14px);
    flex-direction: column;
    padding: 1.5rem 2rem;
    gap: 1.1rem;
    border-bottom: 1px solid var(--hairline);
  }

  nav .nav-links.open { display: flex; }

  .hero-image-wrap { height: 64vh; min-height: 320px; }
  .hero-meta { padding: 1.75rem 1.5rem 3rem; }
  .hero-title { font-size: clamp(2.6rem, 11vw, 4.4rem); }

  .modal-content { grid-template-columns: 1fr; }
  /* Image first, taller — let the painting breathe on phones. */
  .modal-image {
    aspect-ratio: var(--ratio, 4/5);
    min-height: 240px;
    max-height: 70vh;
  }
  .modal-details { max-height: none; padding: 1.75rem 1.5rem; }
  /* Narrow viewports: stack label above value so the size string can
     still render on one line at the full container width. */
  .modal-meta .row { grid-template-columns: 1fr; gap: 0.2rem; }

  section { padding: 4rem 1.5rem; }
  .collection-header { padding: 7rem 1.5rem 2.5rem; }

  .section-title { flex-direction: column; gap: 0.5rem; }
}

@media (max-width: 480px) {
  .category-grid { grid-template-columns: 1fr; }
  .hero-title { font-size: 2.4rem; letter-spacing: -0.02em; }
  .testimonial blockquote { font-size: 1.08rem; }
  .modal-overlay { padding: 0; }
  .modal { margin: 0; }
}

/* --- Semantic italic (replaces <em> visual abuse) --- */
.italic { font-style: italic; }

/* --- Logo squiggle (subtle SVG flourish under nav logo) --- */
nav .logo {
  position: relative;
  display: inline-flex;
  flex-direction: column;
  line-height: 1;
}
nav .logo .logo-squiggle {
  display: block;
  width: 36px;
  height: 6px;
  margin-top: 4px;
  color: var(--accent);
  opacity: 0.55;
}

/* --- Visually hidden (for labels) --- */
.visually-hidden {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

/* --- Custom cursor (hover on cards / hero) ---
   Positioned via a single inline transform (set per rAF frame from JS).
   Visibility toggles opacity only — the transform stays in JS-driven
   land so we get a single style write per frame. */
.custom-cursor {
  position: fixed;
  top: 0; left: 0;
  width: 64px; height: 64px;
  border: 1px solid var(--text);
  border-radius: 999px;
  background: rgba(247, 245, 239, 0.42);
  backdrop-filter: blur(2px);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s ease;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.78rem;
  color: var(--text);
  letter-spacing: 0.02em;
  user-select: none;
  will-change: transform;
}
.custom-cursor.visible {
  opacity: 1;
}
@media (hover: none), (prefers-reduced-motion: reduce) {
  .custom-cursor { display: none !important; }
}
body.cursor-hide,
body.cursor-hide * { cursor: none !important; }

/* --- Testimonials asymmetric layout (only renders when data exists) --- */
.testimonials-grid {
  grid-template-columns: 5fr 4fr 6fr;
}
@media (max-width: 900px) {
  .testimonials-grid { grid-template-columns: 1fr; }
}

/* --- Reveal animation --- */
.reveal {
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }

@media (prefers-reduced-motion: reduce) {
  .reveal, .painting-card, .painting-card .card-image img,
  .btn, a, .modal, .custom-cursor { transition: none !important; animation: none !important; }
  .reveal { opacity: 1; transform: none; }
  html { scroll-behavior: auto; }
}

/* Sticky mobile CTA bar — only appears on small screens once the user
   has scrolled past the hero. Renders as a mailto link, ≤56px tall. */
.mobile-cta {
  display: none;
}
@media (max-width: 768px) {
  .mobile-cta {
    display: flex;
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 90;
    align-items: center;
    justify-content: center;
    height: 56px;
    padding: 0 1.5rem;
    background: rgba(20, 19, 15, 0.96);
    color: var(--paper);
    font-family: var(--font-display);
    font-style: italic;
    font-size: 1rem;
    letter-spacing: 0.01em;
    text-decoration: none;
    border-top: 1px solid rgba(255,255,255,0.08);
    transform: translateY(100%);
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0;
    pointer-events: none;
  }
  .mobile-cta.visible {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  .mobile-cta::after {
    content: ' \2192';
    margin-left: 0.4rem;
  }
}
@media (prefers-reduced-motion: reduce) {
  .mobile-cta { transition: none; }
}

/* Skip link */
.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: var(--text);
  color: var(--paper);
  padding: 0.5rem 1rem;
  z-index: 200;
  font-size: 0.85rem;
}
.skip-link:focus { top: 0; }
</style>

<script>
/* ========================================================
   SITE_DATA — single source of truth for studio/copy info.
   Sveta: fill these in when ready. Empty / null values trigger
   graceful degradation — sections, sentences, links simply
   don't render. There are NEVER visible [TODO] markers
   to the visitor.
   ======================================================== */
const SITE_DATA = {
  artist: {
    name: "Sveta",
    location: "Thornhill, Ontario, Canada",        // e.g. "Toronto, Canada" — appears in About preview + Footer
    yearsPracticing: 8, // e.g. 8                  — appears in About preview
    schooling: "self-taught",       // e.g. "self-taught"      — appears in About full
    influences: null,      // e.g. "Lois Dodd, Vuillard, Peter Doig" — About full
    exhibitions: [],       // [{year:2024, title:"Group show", venue:"Gallery X", city:"Berlin"}]
    instagram: null,       // e.g. "https://instagram.com/sveta.colours"
    studioPhotoUrl: "https://drive.google.com/file/d/1zgwCypofyOuySa-O4QKiIck-3AXysKw9/view?usp=drive_link"   // e.g. "/studio.jpg" — used by Process section

/* ========================================================
   GOOGLE SHEET LOADER
   ======================================================== */

function parseCSV(text) {
  const rows = [];
  let current = '', inQuotes = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') inQuotes = false;
      else current += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(current.trim()); current = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
        row.push(current.trim());
        if (row.some(c => c !== '')) rows.push(row);
        row = []; current = '';
        if (ch === '\r') i++;
      } else current += ch;
    }
  }
  row.push(current.trim());
  if (row.some(c => c !== '')) rows.push(row);
  return rows;
}

function driveImageURL(raw) {
  if (!raw) return '';
  let match = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!match) match = raw.match(/id=([a-zA-Z0-9_-]+)/);
  if (!match) match = raw.match(/^([a-zA-Z0-9_-]{20,})$/);
  if (match) return `https://lh3.googleusercontent.com/d/${match[1]}`;
  if (raw.startsWith('http')) return raw;
  return '';
}

function sheetRowToPainting(row, headers, index) {
  const get = (name) => {
    const i = headers.findIndex(h => h.toLowerCase().replace(/[^a-z]/g,'') === name);
    return i >= 0 ? (row[i] || '') : '';
  };
  const yes = (s) => {
    const v = (s || '').toLowerCase().trim();
    return v === 'yes' || v === 'true' || v === '1' || v === 'y';
  };

  const priceStr = get('price');
  // Sold determined ONLY by 'sold' column. Featured is a separate flag
  // (used for hero pickup / "recent" highlights), not for availability.
  const sold = yes(get('sold'));
  const featured = yes(get('featured'));

  // Dimensions for aspect ratio + size-chapter assignment. Prefer explicit
  // `widthin`/`heightin` columns; otherwise pull the two numbers out of the
  // `size` string ("16x20 in") and use the `orientation` column to decide
  // which is width vs. height — a 16×20 painting can be either portrait
  // (16w × 20h) or landscape (20w × 16h), and the `size` text alone is
  // ambiguous. Defaults to portrait when orientation is blank.
  const widthInStr = get('widthin');
  const heightInStr = get('heightin');
  let widthIn = widthInStr ? parseFloat(widthInStr) : null;
  let heightIn = heightInStr ? parseFloat(heightInStr) : null;
  if ((!widthIn || isNaN(widthIn) || !heightIn || isNaN(heightIn))) {
    const sizeStr = get('size');
    if (sizeStr) {
      const m = sizeStr.match(/(\d+(?:\.\d+)?)\s*[x×]\s*(\d+(?:\.\d+)?)/i);
      if (m) {
        const a = parseFloat(m[1]);
        const b = parseFloat(m[2]);
        const orient = (get('orientation') || '').toLowerCase().trim();
        const smaller = Math.min(a, b);
        const larger = Math.max(a, b);
        if (orient === 'landscape' || orient === 'wide' || orient === 'l') {
          widthIn = larger;  heightIn = smaller;
        } else {
          // portrait (default) or square
          widthIn = smaller; heightIn = larger;
        }
      }
    }
  }

  return {
    id: index + 1,
    title: get('title'),
    medium: get('medium').toLowerCase(),
    price: priceStr ? parseFloat(priceStr.replace(/[^0-9.]/g, '')) : null,
    sold: sold,
    size: get('size'),
    image: driveImageURL(get('image')),
    description: get('description'),
    collections: get('collection') ? get('collection').split(',').map(c => c.trim()).filter(Boolean) : [],
    available: !sold,
    featured: featured,
    // New optional fields — render only if present
    year: get('year'),
    surface: get('surface'),
    signed: get('signed'),
    framed: get('framed'),
    shippingFrom: get('shippingfrom'),
    certificate: get('certificate'),
    widthIn: (widthIn && !isNaN(widthIn)) ? widthIn : null,
    heightIn: (heightIn && !isNaN(heightIn)) ? heightIn : null,
    dominantColor: get('dominantcolor') || get('color') || ''
  };
}

async function loadFromSheet() {
  if (!SHEET_CSV_URL) return;
  try {
    document.getElementById('app').innerHTML = `
      <div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
        <p style="color:var(--text-muted);font-family:var(--font-display);font-style:italic;font-size:1.2rem;">Loading paintings&hellip;</p>
      </div>`;
    const response = await fetch(SHEET_CSV_URL);
    if (!response.ok) throw new Error('Could not fetch sheet');
    const text = await response.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('Sheet appears empty');
    const headers = rows[0].map(h => h.toLowerCase().replace(/[^a-z]/g,''));
    const paintings = rows.slice(1)
      .map((row, i) => sheetRowToPainting(row, headers, i))
      .filter(p => p.title);
    if (paintings.length > 0) PAINTINGS = paintings;
  } catch (err) {
    console.warn('Could not load from Google Sheet:', err.message);
  }
  // Assign stable global catalog numbers (used in cards + hero + cursor).
  assignCatalogNumbers();
  injectPaintingsLD();
  togglePostcardsNav();
  render();
  hydrateFromHash();
}

}

function formatPriceText(p) {

  if (p.price == null || isNaN(p.price)) return '';

function formatPrice(p) {

  if (p.price == null || isNaN(p.price)) return '';
  return `<span class="card-price">${CURRENCY}${p.price.toLocaleString()}</span>`;
}

// Convert "16 x 20 in" or numeric inches to "16 × 20 in / 40.6 × 50.8 cm"
function formatDimensions(p) {
  if (p.widthIn && p.heightIn) {
    const wIn = p.widthIn, hIn = p.heightIn;
    const wCm = (wIn * 2.54).toFixed(1).replace(/\.0$/, '');
    const hCm = (hIn * 2.54).toFixed(1).replace(/\.0$/, '');
    return `${wIn} × ${hIn} in / ${wCm} × ${hCm} cm`;
  }
  if (p.size) {
    // Try to parse "16 x 20 in" or "16x20"
    const m = p.size.match(/(\d+(?:\.\d+)?)\s*[x×]\s*(\d+(?:\.\d+)?)/i);
    if (m) {
      const wIn = parseFloat(m[1]), hIn = parseFloat(m[2]);
      const wCm = (wIn * 2.54).toFixed(1).replace(/\.0$/, '');
      const hCm = (hIn * 2.54).toFixed(1).replace(/\.0$/, '');
      return `${wIn} × ${hIn} in / ${wCm} × ${hCm} cm`;
    }
    return p.size;
  }
  return '';
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

/* Hard-cap a description to keep the modal scannable.
   Returns the FIRST 2 sentences OR a 240-char prefix — whichever is
   shorter — with a trailing ellipsis when truncation occurred. */
function truncateDescription(text) {
  if (!text) return '';
  const clean = String(text).trim();
  if (!clean) return '';
  // Split into sentences (keep terminator). Quick, language-agnostic-ish.
  const sentences = clean.match(/[^.!?]+[.!?]+(\s+|$)|[^.!?]+$/g) || [clean];
  const twoSent = sentences.slice(0, 2).join('').trim();
  const byChars = clean.length > 240 ? clean.slice(0, 240).trim() + '…' : clean;
  // Whichever is shorter wins.
  const chosen = twoSent.length <= byChars.length ? twoSent : byChars;
  // Append ellipsis if we actually trimmed and didn't already.
  if (chosen.length < clean.length && !/[…]$/.test(chosen)) {
    return chosen.replace(/[.!?]?\s*$/, '') + '…';
  }
  return chosen;
}

function paintingMeta(p) {
  // Build editorial meta string: "Acrylic on canvas · 16 × 20 in / 40.6 × 50.8 cm".
  // Year intentionally omitted — only 4/17 paintings have it, and asymmetric
  // meta strings (some with year, most without) read messier than the omission.
  // Year still surfaces in the modal's primary-rows table.
  const parts = [];
  const medium = p.medium ? capitalize(p.medium) : '';
  const surface = p.surface ? p.surface.toLowerCase() : '';
  if (medium && surface) parts.push(`${medium} on ${surface}`);
  else if (medium) parts.push(medium);
  const dims = formatDimensions(p);
  if (dims) parts.push(dims);
  return parts.length ? parts.join(' · ') : '';
}

function aspectRatioFor(p) {
  if (p.widthIn && p.heightIn && p.widthIn > 0 && p.heightIn > 0) {
    return `${p.widthIn}/${p.heightIn}`;
  }
  // Try to parse from size string
  if (p.size) {
    const m = p.size.match(/(\d+(?:\.\d+)?)\s*[x×]\s*(\d+(?:\.\d+)?)/i);
    if (m) {
      const w = parseFloat(m[1]), h = parseFloat(m[2]);
      if (w > 0 && h > 0) return `${w}/${h}`;
    }
  }
  return '4/5';
}

function placeholderGradient(id) {
  const grads = [
    'linear-gradient(160deg, #d6cfc1, #bfb6a4)',
    'linear-gradient(160deg, #c8c2b3, #aea796)',
    'linear-gradient(160deg, #ddd5c5, #c5bda9)',
    'linear-gradient(160deg, #b8b0a0, #9c9384)',
    'linear-gradient(160deg, #cec7b8, #b3aa97)',
    'linear-gradient(160deg, #d4ccbd, #b8b09e)',
    'linear-gradient(160deg, #b0a895, #918876)',
    'linear-gradient(160deg, #c4bcab, #a89f8c)',
    'linear-gradient(160deg, #d8d1c2, #c0b9a6)',
  ];
  return grads[id % grads.length];
}

function paintingImage(p, opts) {
  opts = opts || {};
  const alt = `${p.title} — original ${p.medium || 'painting'} painting by Sveta`;
  if (p.image) {
    const loadAttr = opts.isHero ? 'fetchpriority="high"' : 'loading="lazy" decoding="async"';
    const crossOrigin = opts.crossOrigin ? 'crossorigin="anonymous"' : '';
    // Intrinsic dims from Sheet widthIn/heightIn eliminate first-paint CLS:
    // the browser knows the image's natural ratio before the bytes arrive.
    // Fall back to a 4×5 portrait if dims are missing (matches the CSS
    // default in aspectRatioFor()).
    const wAttr = p.widthIn ? `width="${Math.round(p.widthIn * 100)}"` : 'width="400"';
    const hAttr = p.heightIn ? `height="${Math.round(p.heightIn * 100)}"` : 'height="500"';
    // Google Drive (lh3.googleusercontent.com) accepts an =w<N> suffix that
    // returns a thumbnail at that pixel width. Build a srcset so phones
    // don't pull the full-res original. Hero gets a larger floor.
    const srcsetAttr = (p.image.indexOf('lh3.googleusercontent.com') !== -1)
      ? `srcset="${p.image}=w400 400w, ${p.image}=w800 800w, ${p.image}=w1400 1400w" sizes="${opts.isHero ? '(max-width:768px) 100vw, 1200px' : '(max-width:600px) 100vw, (max-width:1024px) 50vw, 33vw'}"`
      : '';
    // Refine the rendered aspect ratio from natural dims, but only when it
    // differs from the pre-paint ratio by more than 5% — and gated through
    // requestAnimationFrame so the span recompute lands in one frame, not
    // a frame after the dimension change. For accurate Sheet dims this is
    // effectively dead code (the comparison shortcuts before the write).
    const ratioVar = opts.heroRatioVar ? '--hero-ratio' : '--ratio';
    const closestSel = opts.heroRatioVar ? '.hero-image-wrap' : '.card-image-inner';
    const onLoad = `onload="(function(el){requestAnimationFrame(function(){var c=el.closest('${closestSel}');if(!c||!el.naturalWidth||!el.naturalHeight)return;var rect=c.getBoundingClientRect();if(!rect.width||!rect.height)return;var nr=el.naturalWidth/el.naturalHeight;var cur=rect.width/rect.height;if(Math.abs(nr-cur)/cur<0.05)return;c.style.setProperty('${ratioVar}',el.naturalWidth+'/'+el.naturalHeight);});})(this);"`;
    return `<img src="${p.image}" ${srcsetAttr} alt="${alt}" ${wAttr} ${hAttr} ${loadAttr} ${crossOrigin} ${onLoad}>`;
  }
  return `<div style="width:100%;height:100%;min-height:240px;background:${placeholderGradient(p.id)};display:flex;align-items:center;justify-content:center;" role="img" aria-label="${alt}"><span style="font-family:var(--font-display);font-style:italic;font-size:1.1rem;color:rgba(20,19,15,0.22);text-align:center;padding:1rem;">${p.title}</span></div>`;
}

function cardHTML(p) {
  const ratio = aspectRatioFor(p);
  // Sold cards fill the price slot with the word "Sold" so the card layout
  // is identical across states — the slot is always there, never blank.
  // (Modal still uses the struck-through price treatment where it informs.)
  const priceHTML = p.sold
    ? `<span class="card-price card-price--sold">Sold</span>`
    : (p.price ? `<span class="card-price">${CURRENCY}${p.price.toLocaleString()}</span>` : '');
  const meta = paintingMeta(p);
  // Mark cards by physical size so the 11×14 inset rule can shrink the
  // image to ~85% column width — a real-world scale cue without an S/M chip.
  const area = (p.widthIn && p.heightIn) ? p.widthIn * p.heightIn : null;
  const dataSize = (area != null && area < 300) ? ' data-size="small"' : '';
  // Pre-seed grid-row span at render time from the aspect ratio + estimated
  // column width so masonry lands stable on first paint (no auto→8px swap).
  // computeMasonry() refines this after images load.
  const span = estimateGridRowSpan(ratio);
  const aria = p.sold
    ? `Open details for ${p.title}, sold`
    : `Open details for ${p.title}${p.price ? ', ' + CURRENCY + p.price : ''}`;
  return `
    <a class="painting-card reveal${p.sold ? ' is-sold' : ''}" href="#painting/${p.id}" data-card-id="${p.id}"${dataSize} style="grid-row: span ${span};" onclick="return cardClick(event, ${p.id});" aria-label="${aria}">
      <div class="card-image">
        <div class="card-image-inner" style="--ratio: ${ratio};">${paintingImage(p)}</div>
      </div>
      <div class="card-info">
        <div class="card-text">
          <div class="card-title">${p.title}</div>
          ${meta ? `<div class="card-meta">${meta}</div>` : ''}
          ${priceHTML}
        </div>
      </div>
    </a>`;
}

// Estimate the masonry span at render-time from the aspect ratio. Reads
// `--gallery-col-width` if set on the grid (computed once after layout); else
// falls back to a viewport-based estimate. Width-driven height = colW / ratio
// (ratio = w/h), plus ~120px for .card-info (title + meta + price). Rounded
// up to 8px row grid. Refined post-image-load by computeMasonry().
function estimateGridRowSpan(ratio) {
  const m = String(ratio).split('/');
  const w = parseFloat(m[0]) || 4;
  const h = parseFloat(m[1]) || 5;
  const aspect = w / h;
  let colW;
  if (typeof window !== 'undefined' && window.innerWidth) {
    const vw = window.innerWidth;
    if (vw <= 600) colW = vw - 32;          // single column
    else if (vw <= 1024) colW = Math.min(360, (vw - 80) / 3);
    else colW = Math.min(360, (vw - 120) / 4);
  } else {
    colW = 300;
  }
  const imageHeight = colW / aspect;
  const infoHeight = 120;
  const total = imageHeight + infoHeight;
  return Math.ceil(total / 8);
}

/* ========================================================
   MODAL
   ======================================================== */

let lastFocusedElement = null;

// Card-click handler that respects modifier keys + non-primary clicks so
// right-click / cmd-click / middle-click still work as native browser
// behaviours (open in new tab, open in new window). Only left-click without
// modifiers gets intercepted to open the modal.
function cardClick(e, id) {
  if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return true;
  e.preventDefault();
  openModal(id, { pushHistory: true });
  return false;
}

function openModal(id, opts) {
  opts = opts || {};
  const p = PAINTINGS.find(x => x.id === id);
  if (!p) return;
  lastFocusedElement = document.activeElement;

  // Reflect the open modal in the URL so deep-links + back-button work. Skip
  // when called from a popstate handler (we're already at the right URL) or
  // when called from the initial direct-link hydration path.
  if (opts.pushHistory) {
    try {
      history.pushState({ paintingId: id }, '', '#painting/' + id);
    } catch (e) { /* private mode, opaque origin, etc. — non-fatal */ }
  }

  const subject = encodeURIComponent(`Inquiry about "${p.title}"`);

  // Primary meta — what every collector wants up-front.
  const primaryRows = [];
  const dims = formatDimensions(p);
  if (dims) primaryRows.push(['Size', dims]);
  if (p.medium) primaryRows.push(['Medium', capitalize(p.medium) + (p.surface ? ` on ${p.surface.toLowerCase()}` : '')]);
  if (p.year) primaryRows.push(['Year', p.year]);
  if (p.signed) primaryRows.push(['Signed', p.signed]);

  // Secondary meta — practical but lower priority. Tucked into a <details>
  // block so the primary table stays tight.
  const extraRows = [];
  if (p.framed) extraRows.push(['Framing', p.framed]);
  if (p.shippingFrom) extraRows.push(['Ships from', p.shippingFrom]);
  if (p.certificate) extraRows.push(['Authenticity', p.certificate]);

  const rowsToHTML = (rows) => rows.map(([l, v]) =>
    `<div class="row"><span class="label">${l}</span><span class="value">${v}</span></div>`
  ).join('');

  const metaHTML = primaryRows.length
    ? `<div class="modal-meta">${rowsToHTML(primaryRows)}</div>`
    : '';

  const extraHTML = extraRows.length
    ? `<details class="modal-extra"><summary>Details</summary><div class="modal-meta">${rowsToHTML(extraRows)}</div></details>`
    : '';

  // Sold pieces show the word "Sold" in the price slot — never the
  // crossed-out price. (The previous strike-through SVG also rendered
  // wider than the price text because the absolutely-positioned SVG was
  // measured against modal-details, not the inline-block .modal-price.)
  // The label stands alone; the modal CTA section restates "Sold."
  // alongside the commission offer.
  const priceHTML = p.sold
    ? `<div class="modal-price sold">Sold</div>`
    : (p.price ? `<div class="modal-price">${CURRENCY}${p.price.toLocaleString()}</div>` : '');

  // Trim long descriptions to keep the modal scannable: hard-cap at the
  // first 2 sentences OR 240 chars, whichever is shorter. Ellipsis on
  // truncate.
  const truncatedDesc = truncateDescription(p.description);

  const ctaHTML = p.sold
    ? `<div class="modal-cta">
         <div class="cta-note"><span class="italic">Sold.</span> Write if you'd like a similar commission.</div>
         <a href="mailto:${CONTACT_EMAIL}?subject=${subject}" class="cta-link">Write to studio &rarr;</a>
       </div>`
    : `<div class="modal-cta">
         <a href="mailto:${CONTACT_EMAIL}?subject=${subject}" class="cta-link">Write to studio &rarr;</a>
         <div class="cta-note">Replies within a day or two. Shipped from Canada, insured.</div>
       </div>`;

  const collectionsHTML = (p.collections || []).length
    ? `<div class="modal-collections">${(p.collections || []).map(c =>
        `<button class="chip" type="button" onclick="closeModal();showPage('collection:${encodeURIComponent(c)}')">${c}</button>`
      ).join('')}</div>`
    : '';

  const subMeta = paintingMeta(p);
  const modalRatio = aspectRatioFor(p);

  // Modal image needs crossorigin for canvas sampling. Will silently fall back
  // if CORS blocks (Google Drive sometimes does).
  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    <div class="modal-image" style="--ratio: ${modalRatio};">${paintingImage(p, { crossOrigin: true })}</div>
    <div class="modal-details">
      <h2 id="modalTitle">${p.title}</h2>
      ${subMeta ? `<div class="modal-sub">${subMeta}</div>` : ''}
      ${truncatedDesc ? `<p class="description">${truncatedDesc}</p>` : ''}
      ${priceHTML}
      ${metaHTML}
      ${extraHTML}
      ${ctaHTML}
      ${collectionsHTML}
    </div>`;

  // Make page behind modal inert for assistive tech + keyboard
  const mainEl = document.querySelector('main');
  if (mainEl) {
    mainEl.setAttribute('inert', '');
    mainEl.setAttribute('aria-hidden', 'true');
  }

  // Apply dominant color: prefer Sheet-provided p.dominantColor, otherwise
  // sample from the loaded image (canvas, with reduced-motion guard).
  applyAccentTint(p);

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Focus management
  setTimeout(() => {
    const closeBtn = document.querySelector('.modal-close');
    if (closeBtn) closeBtn.focus();
  }, 50);
}

function applyAccentTint(p) {
  // Reset to default first
  document.documentElement.style.removeProperty('--accent-tint');
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  if (p.dominantColor) {
    document.documentElement.style.setProperty('--accent-tint', p.dominantColor);
    return;
  }

  // Sample from the modal image once it has loaded
  const img = document.querySelector('.modal-image img');
  if (!img) return;
  const finish = () => {
    try {
      const canvas = document.createElement('canvas');
      const W = 32, H = 32;
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, W, H);
      // Sample center 60% region (avoids edges / frame artifacts)
      const data = ctx.getImageData(W * 0.2, H * 0.2, W * 0.6, H * 0.6).data;
      let r = 0, g = 0, b = 0, n = 0;
      for (let i = 0; i < data.length; i += 4) { r += data[i]; g += data[i+1]; b += data[i+2]; n++; }
      r = Math.round(r/n); g = Math.round(g/n); b = Math.round(b/n);
      // Mix with bone (#EAE6DE → 234,230,222) at 55% to desaturate
      const mix = (a, b) => Math.round(a * 0.55 + b * 0.45);
      const rm = mix(r, 234), gm = mix(g, 230), bm = mix(b, 222);
      document.documentElement.style.setProperty('--accent-tint', `rgb(${rm}, ${gm}, ${bm})`);
    } catch (e) {
      // CORS-tainted canvas — silently keep default accent
    }
  };
  if (img.complete && img.naturalWidth > 0) finish();
  else img.addEventListener('load', finish, { once: true });
}

// `closeModal(fromPopstate)` — when we're closing because a popstate event
// took us away from a #painting/N URL, the history is already where it
// should be and we MUST NOT push or back again. When we're closing via X /
// ESC / backdrop, undo the history.pushState we did on open: history.back()
// if the topmost state is ours, else strip the hash with replaceState so the
// URL doesn't keep a stale #painting/N.
function closeModal(fromPopstate) {
  const modalEl = document.getElementById('modal');
  if (!modalEl.classList.contains('open')) return;
  modalEl.classList.remove('open');
  document.body.style.overflow = '';

  // Reset accent tint
  document.documentElement.style.removeProperty('--accent-tint');

  // Un-inert main
  const mainEl = document.querySelector('main');
  if (mainEl) {
    mainEl.removeAttribute('inert');
    mainEl.removeAttribute('aria-hidden');
  }

  if (!fromPopstate) {
    try {
      if (history.state && history.state.paintingId) {
        history.back();
      } else if (/#painting\//.test(window.location.hash)) {
        history.replaceState({}, '', window.location.pathname + window.location.search);
      }
    } catch (e) { /* non-fatal */ }
  }

  // Guard against detached node (race: e.g. card was re-rendered while modal was open)
  if (lastFocusedElement && typeof lastFocusedElement.focus === 'function' && lastFocusedElement.isConnected) {
    lastFocusedElement.focus();
  }
}

// popstate: drive the modal from the URL. If the hash resolves to a painting,
// open it (without re-pushing); else close any open modal.
window.addEventListener('popstate', () => {
  const m = window.location.hash.match(/^#painting\/(\d+)$/);
  if (m) {
    const id = parseInt(m[1], 10);
    if (PAINTINGS.find(p => p.id === id)) {
      openModal(id, { pushHistory: false });
      return;
    }
  }
  closeModal(true);
});

// Direct-link arrival: if the page loads with #painting/N, open that modal
// once paintings are available. Called from loadFromSheet / the no-Sheet boot.
function hydrateFromHash() {
  const m = window.location.hash.match(/^#painting\/(\d+)$/);
  if (!m) return;
  const id = parseInt(m[1], 10);
  if (PAINTINGS.find(p => p.id === id)) {
    openModal(id, { pushHistory: false });
  }
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  // Focus trap inside modal
  if (e.key === 'Tab' && document.getElementById('modal').classList.contains('open')) {
    const focusables = document.querySelectorAll('.modal a, .modal button, .modal [tabindex]:not([tabindex="-1"])');
    if (focusables.length === 0) return;
    const first = focusables[0];
    const last = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }
});

/* ========================================================

function injectPaintingsLD() {

/* ========================================================
   CURATION HELPERS
   ========================================================
   selectFeatured — picks the home-page "Recent paintings" set.

   Algorithm:
     1) Pinned: take up to 4 paintings flagged featured===true,
        excluding the hero piece, excluding sold.
     2) Fill: from remaining available && image && !sold, in
        original Sheet order, until we reach `count`.
     3) De-cluster orientation via interleaveByOrientation()
        so adjacent cards don't stack into same-orientation
        bands on the wall.

   The function never returns sold pieces. If the available
   pool is smaller than `count`, the grid simply shows fewer
   cards — we never pad with sold work. */
function selectFeatured(paintings, count, excludeHeroId) {
  count = count || 6;
  const isShowable = p => p.available && !p.sold && p.image;
  const not = id => p => p.id !== id;

  const pool = paintings.filter(not(excludeHeroId));
  const pinned = pool.filter(p => p.featured && isShowable(p)).slice(0, 4);
  const pinnedIds = new Set(pinned.map(p => p.id));

  const filler = pool
    .filter(p => isShowable(p) && !pinnedIds.has(p.id));

  // Cap at whatever's actually showable — no sold-padding branch. At ~11
  // available the home grid should never resort to surfacing sold pieces.
  const showable = pinned.concat(filler);
  let chosen = showable.slice(0, Math.min(count, showable.length));

  return interleaveByOrientation(chosen);
}

// Numeric w/h ratio for a painting (landscape > 1, portrait/square ≤ 1).
// Used by interleaveByOrientation; also a small lookup for the size-class.
function paintingRatio(p) {
  if (p.widthIn && p.heightIn && p.heightIn > 0) return p.widthIn / p.heightIn;
  if (p.size) {
    const m = p.size.match(/(\d+(?:\.\d+)?)\s*[x×]\s*(\d+(?:\.\d+)?)/i);
    if (m) {
      const w = parseFloat(m[1]), h = parseFloat(m[2]);
      if (h > 0) return w / h;
    }
  }
  return 4 / 5; // portrait default
}

// "Zip" portrait + landscape paintings so no more than 2 consecutive cards
// share orientation. Stable: relative order within each bucket is preserved.
// We start with whichever bucket is larger so any trailing run is shortest.
function interleaveByOrientation(items) {
  const landscape = items.filter(p => paintingRatio(p) > 1);
  const portrait  = items.filter(p => paintingRatio(p) <= 1);
  const out = [];
  let a = landscape.length >= portrait.length ? landscape.slice() : portrait.slice();
  let b = landscape.length >= portrait.length ? portrait.slice() : landscape.slice();
  while (a.length || b.length) {
    if (a.length) out.push(a.shift());
    if (b.length) out.push(b.shift());
  }
  return out;
}

/* Assigns a stable global catalog number to every painting (1-indexed in
   Sheet order). Same painting shows the same № wherever it appears. */
function assignCatalogNumbers() {
  PAINTINGS.forEach((p, i) => { p.catalogNumber = i + 1; });
}

function getHeroPiece() {
  // Sold pieces are NEVER the hero — never put a "Sold" piece front-and-centre.
  return (
    PAINTINGS.find(p => p.featured && p.available && !p.sold && p.image) ||
    PAINTINGS.find(p => p.available && !p.sold && p.image) ||
    PAINTINGS.find(p => p.available && !p.sold) ||
    PAINTINGS[0]
  );
}

    ? [

  const heroRatio = heroPiece ? aspectRatioFor(heroPiece) : '4/5';

// Size-class label for the /works chapters. Today the studio inventory
// clusters into two formats — 16×20 in (large) and 11×14 in (small) — so
// the page reads as two rooms rather than one flat 11-painting feed.
// `area` is in square inches; anything ≥ 300 sq in is treated as "large"
// (16×20 = 320; 11×14 = 154). Falls back to a single chapter when paintings
// don't carry dimensions yet.
function sizeChapterFor(p) {
  if (!p.widthIn || !p.heightIn) return 'unknown';
  return (p.widthIn * p.heightIn) >= 300 ? 'large' : 'small';
}

function renderPaintings() {
  // /works shows the WHOLE body of work — available paintings and pieces
  // already in private collections, side by side. Each sold card renders
  // "Sold" in its price slot and carries an .is-sold class for the muted
  // visual treatment. /past remains as a sold-only archive view reachable
  // by URL, but isn't linked from here anymore.
  const works = PAINTINGS;

  // Partition by size class. Interleave portrait/landscape within each
  // chapter so adjacent same-orientation cards don't stack into bands.
  const large = interleaveByOrientation(works.filter(p => sizeChapterFor(p) === 'large'));
  const small = interleaveByOrientation(works.filter(p => sizeChapterFor(p) === 'small'));
  const unknown = works.filter(p => sizeChapterFor(p) === 'unknown');

  const chapter = (title, items, id) => items.length
    ? `<section aria-labelledby="${id}" class="works-chapter">
         <div class="section-inner">
           <h2 id="${id}" class="hang-chapter">${title}</h2>
           <div class="gallery-grid" data-masonry>
             ${items.map(cardHTML).join('')}
           </div>
         </div>
       </section>`
    : '';

  const emptyMsg = `<section><div class="section-inner"><p style="text-align:center;color:var(--text-muted);font-family:var(--font-display);font-style:italic;">No paintings yet.</p></div></section>`;

  // When every painting carries dimensions: render two real chapters.
  // When some are missing dims: render an extra "Other works" chapter so
  // nothing silently disappears.
  let body;
  if (!works.length) {
    body = emptyMsg;
  } else if (large.length + small.length === 0) {
    // No dimensions on any painting — fall back to one undifferentiated grid.
    body = `<section><div class="section-inner"><div class="gallery-grid" data-masonry>${unknown.map(cardHTML).join('')}</div></div></section>`;
  } else {
    body = chapter('Large works &mdash; 16 &times; 20 in', large, 'works-large')
         + chapter('Small works &mdash; 11 &times; 14 in', small, 'works-small')
         + chapter('Other works', interleaveByOrientation(unknown), 'works-other');
  }

  return `
    <div class="collection-header">
      <a href="#home" class="back-link" onclick="event.preventDefault(); showPage('home');">&larr; Back</a>
      <h1>Works</h1>
      <p>Every painting one-of-a-kind. Available works and pieces already in private collections &mdash; commission requests welcome.</p>
    </div>
    ${body}
    ${renderContactSection()}
  `;
}

    case 'faq':         html = renderFAQ(); break;

  // LCP hint: promote the first image in each gallery grid. On home and
  // /works that image is almost always the largest contentful paint, so
  // asking the browser to fetch it ahead of the rest meaningfully improves
  // perceived load. Lazy-loading stays on for the rest via paintingImage().
  document.querySelectorAll('.gallery-grid').forEach(grid => {
    const firstImg = grid.querySelector('img');
    if (firstImg) firstImg.setAttribute('fetchpriority', 'high');

  document.title = pageTitleFor(currentPage);

  // benefit from being injected after main)

  else if (currentPage === 'postcards') navKey = 'postcards';
  else if (currentPage === 'about') navKey = 'about';
  else if (currentPage === 'faq') navKey = 'faq';
  if (navKey) {
    const link = document.querySelector(`nav .nav-links a[data-page="${navKey}"]`);
    if (link) link.classList.add('active');
  }

  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), Math.min(i * 50, 600));
    });
    // Compute masonry row spans after layout
    computeMasonry();
  });
  // Recompute again once images have loaded — image height may grow.
  document.querySelectorAll('.gallery-grid img').forEach(img => {
    if (!img.complete) img.addEventListener('load', computeMasonry, { once: true });
  });

  // Wire up the custom cursor for newly-rendered cards
  wireCustomCursor();
}

/* ========================================================
   CSS GRID MASONRY — refines the pre-seeded span (cardHTML emits an
   estimated `grid-row: span N` from aspect-ratio + viewport-based column
   width). computeMasonry() runs after layout and again on image-load to
   correct the seed against the real rendered height. With grid-auto-rows
   fixed at 8px from page-load, there is no FOUC class to toggle.
   ======================================================== */
function computeMasonry() {
  document.querySelectorAll('.gallery-grid[data-masonry]').forEach(grid => {
    const rowH = parseFloat(getComputedStyle(grid).gridAutoRows) || 8;
    const rowGap = parseFloat(getComputedStyle(grid).rowGap) || 0;
    grid.querySelectorAll('.painting-card').forEach(card => {
      // Sum children's natural heights instead of measuring the card itself.
      // With grid-auto-rows: 8px + align-items: stretch (grid default), the
      // card's own bounding rect reflects its grid-allocated height — clearing
      // grid-row would collapse it to 8px, not reveal its natural content.
      // The block-flow children (.card-image and .card-info) report their
      // real rendered heights regardless of the card's forced cell size.
      const img = card.querySelector('.card-image');
      const info = card.querySelector('.card-info');
      const imgH = img ? img.getBoundingClientRect().height : 0;
      const infoH = info ? info.getBoundingClientRect().height : 0;
      const mb = parseFloat(getComputedStyle(card).marginBottom) || 0;
      const h = imgH + infoH + mb;
      if (h <= 0) return; // no children laid out yet — skip
      const span = Math.ceil((h + rowGap) / (rowH + rowGap));
      card.style.gridRow = `span ${span}`;
    });
  });
}

/* ========================================================
   CUSTOM CURSOR — disabled on touch + reduced-motion
   ======================================================== */
let cursorEl = null;
function initCustomCursor() {
  if (!window.matchMedia) return;
  if (window.matchMedia('(hover: none)').matches) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  cursorEl = document.createElement('div');
  cursorEl.className = 'custom-cursor';
  cursorEl.setAttribute('aria-hidden', 'true');
  document.body.appendChild(cursorEl);

  // Throttle cursor updates through requestAnimationFrame to avoid
  // hundreds of style writes per second on a fast mouse.
  let cursorRAF = null;
  let lastX = 0, lastY = 0;
  document.addEventListener('mousemove', (e) => {
    lastX = e.clientX;
    lastY = e.clientY;
    if (!cursorEl) return;
    if (cursorRAF) return;
    cursorRAF = requestAnimationFrame(() => {
      cursorRAF = null;
      if (!cursorEl) return;
      // Single transform write per frame; cheaper than left/top.
      cursorEl.style.transform = `translate(${lastX}px, ${lastY}px) translate(-50%, -50%) scale(${cursorEl.classList.contains('visible') ? 1 : 0.6})`;
    });
  }, { passive: true });
}

function wireCustomCursor() {
  if (!cursorEl) return;
  const targets = document.querySelectorAll('.painting-card, .hero-image-wrap');
  targets.forEach(t => {
    if (t._cursorWired) return;
    t._cursorWired = true;
    t.addEventListener('mouseenter', () => {
      // Cursor label = the painting's title, truncated. Falls back to "View"
      // if we can't resolve. (Previously used catalog № — removed when № was
      // dropped from the card geometry.)
      let label = 'View';
      const card = t.closest('.painting-card') || (t.classList.contains('painting-card') ? t : null);
      const resolveTitle = (painting) => {
        if (!painting || !painting.title) return null;
        return painting.title.length > 26 ? painting.title.slice(0, 24) + '…' : painting.title;
      };
      if (card) {
        const idAttr = card.getAttribute('data-card-id');
        const id = idAttr ? parseInt(idAttr, 10) : NaN;
        const painting = !isNaN(id) ? PAINTINGS.find(p => p.id === id) : null;
        const title = resolveTitle(painting);
        if (title) label = `View "${title}"`;
      } else if (t.classList.contains('hero-image-wrap')) {
        const title = resolveTitle(getHeroPiece());
        if (title) label = `View "${title}"`;
      }
      cursorEl.textContent = label;
      cursorEl.classList.add('visible');
      document.body.classList.add('cursor-hide');
    });
    t.addEventListener('mouseleave', () => {
      cursorEl.classList.remove('visible');
      document.body.classList.remove('cursor-hide');
    });
  });
}

/* ========================================================
   STICKY MOBILE CTA — appears once scrolled past hero.
   Only meaningful at ≤768px (CSS gates visibility).
   ======================================================== */
function initMobileCTA() {
  const cta = document.getElementById('mobileCTA');
  if (!cta) return;
  // mailto: with subject — same wiring as the modal CTA.
  cta.setAttribute('href', `mailto:${CONTACT_EMAIL}?subject=${encodeURIComponent('Hello from sveta-colours.com')}`);
  let ticking = false;
  const onScroll = () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      ticking = false;
      // Trigger after we've scrolled most of the way past the hero.
      // Threshold roughly = hero-image-wrap bottom; we approximate via
      // 60% of viewport height which suits the typical 4/5 hero on phones.
      const trigger = window.innerHeight * 0.6;
      if (window.scrollY > trigger) cta.classList.add('visible');
      else cta.classList.remove('visible');
    });
  };
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
}

// Boot
initCustomCursor();

- Painting cards are now <button>s (keyboard accessible by
  default).
- Modal: focus moves to close on open, focus trap with Shift+Tab,
  returns focus on close, Esc closes, click-outside closes.
- Category cards are role="link" with Enter/Space handlers.
- Reduced-motion media query disables transitions and reveal
  animation.
- Skip-link visible on focus.

SHEET INTEGRATION
- sheetRowToPainting now reads optional fields:
  year, surface, signed, framed, shippingfrom (col: "shippingFrom"
  or "Shipping from"), certificate, widthin, heightin.
- All new fields are optional — empty values mean the field is
  not rendered in the modal / not used for the meta string.
- Aspect ratio: derived from widthIn/heightIn if present,
  otherwise parsed from the size string ("16 x 20 in"), default
  4/5.

TECHNICAL BUG FIXES
T1. Gallery layout switched from CSS columns (which read top-

T2. openModal() now sets inert + aria-hidden on <main>, removed

T3. --text-faint darkened from #8C8478 to #6B6258 (4.6:1 contrast

T5. paintingImage() takes an isHero flag: hero now uses

T6. og:image meta tag removed from static HTML. JS injects

T7. document.title updates on every showPage() call.

T10. <em>Colours</em> in hero / <em>Inquiries</em> in contact

T11. sheetRowToPainting: sold is now determined ONLY by the

T12. Hero pickup logic: featured → first available → first

T13. All href="#" replaced with href="#works" / "#about" / etc

T14. closeModal() checks lastFocusedElement.isConnected before
