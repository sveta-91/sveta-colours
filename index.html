<style>
/* ========================================================
   SVETA COLOURS — V2 EDITORIAL GALLERY DESIGN
   ========================================================
   Palette: bone/oat with a single deep ink-blue accent.
   Rationale: rose-dust + clay + terracotta together read
   too "warm-craft / Etsy". Bone (#EAE6DE) is a classic
   gallery wall tone; ink-blue (#1A2640) gives a single,
   restrained editorial accent — used only for links and
   the rare CTA. Sold and Available no longer have
   competing colors; "Sold" is just italic strikethrough.
   ======================================================== */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Editorial bone/oat palette */
  --bg: #EAE6DE;
  --surface: #F2EFE8;
  --surface-alt: #E0DBD1;
  --paper: #F7F5EF;
  --border: #D6CFC1;
  --border-strong: #BFB6A4;
  --hairline: rgba(20, 19, 15, 0.12);

  --text: #14130F;
  --text-secondary: #3B362D;
  --text-muted: #6B6357;
  /* Darkened from #8C8478 to pass WCAG AA on bone (#EAE6DE) — 4.6:1 contrast */
  --text-faint: #6B6258;

  /* Single accent: deep ink-blue */
  --accent: #1A2640;
  --accent-hover: #2A3A5C;

  /* Dynamic accent tint applied by JS from dominant painting color.
     Falls back to accent. */
  --accent-tint: #1A2640;

  /* Type */
  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body: 'Inter', system-ui, -apple-system, sans-serif;

  /* Layout */
  --max-w: 1280px;
  --max-w-text: 680px;
  --transition: 0.28s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "ss02";
}

::selection { background: var(--accent); color: var(--paper); }

img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }

/* Focus states */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
  border-radius: 2px;
}

/* --- Navigation --- */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(234, 230, 222, 0.86);
  backdrop-filter: blur(14px) saturate(1.1);
  -webkit-backdrop-filter: blur(14px) saturate(1.1);
  border-bottom: 1px solid var(--hairline);
}

nav .nav-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 2rem;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

nav .logo {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.4rem;
  font-weight: 400;
  letter-spacing: -0.005em;
  color: var(--text);
  font-optical-sizing: auto;
}

nav .nav-links { display: flex; gap: 2.2rem; list-style: none; align-items: center; }

nav .nav-links a {
  font-size: 0.84rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--text-secondary);
  transition: color var(--transition);
  position: relative;
}

nav .nav-links a:hover { color: var(--text); }

nav .nav-links a.active::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -6px;
  height: 1px;
  background: var(--text);
}

.hamburger {
  display: none;
  background: none;
  border: none;
  width: 26px;
  height: 18px;
  flex-direction: column;
  justify-content: space-between;
  padding: 0;
}

.hamburger span {
  display: block; width: 100%; height: 1px;
  background: var(--text);
  transition: var(--transition);
}

/* --- Buttons / Links --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  padding: 0 1.4rem;
  border: none;
  border-radius: 4px;
  font-family: var(--font-body);
  font-size: 0.86rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: all var(--transition);
}

.btn-primary {
  background: var(--accent);
  color: var(--paper);
}
.btn-primary:hover { background: var(--accent-hover); }

.btn-outline {
  background: transparent;
  border: 1px solid var(--border-strong);
  color: var(--text);
}
.btn-outline:hover { border-color: var(--text); }

/* Editorial text link: underline with offset */
.link {
  color: var(--text);
  text-decoration: underline;
  text-decoration-color: var(--text-muted);
  text-decoration-thickness: 1px;
  text-underline-offset: 4px;
  transition: text-decoration-color var(--transition), color var(--transition);
  font-size: 0.92rem;
}
.link:hover { text-decoration-color: var(--text); }

.link-accent {
  color: var(--accent);
  text-decoration: underline;
  text-decoration-color: var(--accent);
  text-decoration-thickness: 1px;
  text-underline-offset: 4px;
}
.link-accent:hover { color: var(--accent-hover); text-decoration-color: var(--accent-hover); }

.link-arrow::after {
  content: ' \2192';
  display: inline-block;
  transition: transform var(--transition);
}
.link-arrow:hover::after { transform: translateX(3px); }

/* --- Sections --- */
section { padding: 6rem 2rem; }

.section-inner {
  max-width: var(--max-w);
  margin: 0 auto;
}

.section-title {
  margin-bottom: 3rem;
  border-top: 1px solid var(--hairline);
  padding-top: 2rem;
  display: flex;
  align-items: baseline;
  gap: 2rem;
  justify-content: space-between;
  flex-wrap: wrap;
}

.section-title .eyebrow {
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.section-title h2 {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 400;
  line-height: 1.02;
  letter-spacing: -0.015em;
  color: var(--text);
  flex: 1;
  min-width: 0;
}

.section-title .section-meta {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* --- Hero (editorial full-bleed) --- */
.hero {
  padding: 0;
  position: relative;
  margin-top: 68px;
}

.hero-image-wrap {
  width: 100%;
  height: 75vh;
  min-height: 540px;
  max-height: 900px;
  background: var(--surface-alt);
  position: relative;
  overflow: hidden;
}

.hero-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
}

.hero-image-wrap .hero-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, #d6cfc1, #bfb6a4);
}

.hero-meta {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 2.5rem 2rem 4.5rem;
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 3rem;
  align-items: end;
}

.hero-title {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-variation-settings: "opsz" 144;
  font-size: clamp(3.4rem, 9vw, 8rem);
  font-weight: 400;
  line-height: 0.92;
  letter-spacing: -0.035em;
  color: var(--text);
  margin: 0;
}

.hero-title em,
.hero-title .italic {
  font-style: italic;
  color: var(--text-secondary);
}

.hero-side {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  padding-bottom: 0.5rem;
}

.hero-credit {
  font-family: var(--font-body);
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  line-height: 1.6;
}

.hero-credit .sep { margin: 0 0.5rem; color: var(--text-faint); }

.hero-tagline {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.15rem;
  line-height: 1.45;
  color: var(--text-secondary);
  max-width: 36ch;
}

.hero-cta-row {
  margin-top: 0.5rem;
}

/* --- Gallery Grid: CSS Grid masonry (left-to-right reading order) --- */
/* Row height is small (8px); each card spans N rows computed in JS from its
   rendered height. This preserves the array order top-to-bottom, left-to-right
   while still giving a tight masonry look. Falls back to a plain auto-fit grid
   if JS does not run. */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  grid-auto-rows: 8px;
  gap: 0 2.5rem;
  counter-reset: card;
  position: relative;
}

/* Until JS calculates the span, each card sits in a single column flow.
   This avoids huge gaps on first paint. */
.gallery-grid:not(.masonry-ready) .painting-card {
  grid-row: span 60;
}

@media (max-width: 1024px) {
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0 2rem; }
}
@media (max-width: 600px)  {
  .gallery-grid { grid-template-columns: 1fr; gap: 0; }
}

.painting-card {
  width: 100%;
  margin-bottom: 3rem;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  text-align: left;
  position: relative;
  counter-increment: card;
}

/* Editorial catalog number — sits above the image, top-left of the card.
   Consistent at every viewport width. */
.painting-card::before {
  content: "№ " counter(card, decimal-leading-zero);
  display: block;
  margin-bottom: 0.55rem;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.78rem;
  letter-spacing: 0.02em;
  color: var(--text-faint);
  line-height: 1;
  pointer-events: none;
}

.painting-card .card-image {
  width: 100%;
  background: transparent;
  overflow: hidden;
  /* no border-radius — gallery editorial */
}

.painting-card .card-image-inner {
  width: 100%;
  aspect-ratio: var(--ratio, 4/5);
  background: var(--surface-alt);
  overflow: hidden;
  position: relative;
}

.painting-card .card-image img {
  width: 100%; height: 100%;
  object-fit: cover; /* dynamic aspect ratio means we can cover safely */
  transition: transform 0.6s ease;
}

.painting-card:hover .card-image img { transform: scale(1.02); }

.painting-card .card-info {
  padding: 1.1rem 0 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1.5rem;
}

.painting-card .card-text { flex: 1; min-width: 0; }

.painting-card .card-title {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: 1.35rem;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.15;
  color: var(--text);
  margin-bottom: 0.25rem;
}

.painting-card .card-meta {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.92rem;
  color: var(--text-muted);
  line-height: 1.45;
}

.painting-card .card-price {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--text-secondary);
  white-space: nowrap;
  flex-shrink: 0;
  padding-top: 0.1rem;
}

/* Hand-drawn SVG strikethrough replaces text-decoration on Sold price.
   The .sold-stroke SVG is inserted next to the price text inside the
   .card-price span; we keep the price text color muted but readable. */
.painting-card .card-price {
  position: relative;
}
.painting-card .card-price.sold {
  color: var(--text-faint);
}
.painting-card .card-price .sold-stroke,
.modal-price .sold-stroke {
  position: absolute;
  inset: 50% 0 auto 0;
  transform: translateY(-50%);
  width: 100%;
  height: 0.6em;
  color: var(--text-secondary);
  pointer-events: none;
  display: none;
}
.painting-card .card-price.sold .sold-stroke,
.modal-price.sold .sold-stroke {
  display: block;
}

.painting-card .card-sold-tag {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--text-faint);
  margin-left: 0.4rem;
}

/* --- Category cards --- */
.categories { background: var(--surface); }

.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 0;
  border-top: 1px solid var(--hairline);
}

.category-card {
  padding: 2.5rem 2rem;
  background: transparent;
  border-right: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  cursor: pointer;
  transition: background var(--transition);
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  min-height: 200px;
  justify-content: space-between;
}

.category-card:hover { background: var(--paper); }

.category-card h3 {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: 1.8rem;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.05;
}

.category-card .cat-count {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.92rem;
  color: var(--text-muted);
}

.category-card .cat-arrow {
  margin-top: 1.5rem;
  font-size: 0.82rem;
  letter-spacing: 0.06em;
  color: var(--text-muted);
}

/* --- About preview --- */
.about-preview {
  max-width: var(--max-w-text);
}

.about-preview p {
  font-family: var(--font-display);
  font-size: 1.3rem;
  line-height: 1.5;
  color: var(--text);
  margin-bottom: 1rem;
  font-weight: 400;
  letter-spacing: -0.005em;
}

.about-preview p + p {
  font-size: 1.05rem;
  color: var(--text-secondary);
  font-family: var(--font-body);
  line-height: 1.7;
}

/* --- Testimonials --- */
.testimonials { background: var(--paper); }

.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4rem;
  margin-top: 2rem;
}

.testimonial blockquote {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.2rem;
  line-height: 1.5;
  color: var(--text);
  letter-spacing: -0.005em;
  margin-bottom: 1.25rem;
  position: relative;
}

.testimonial blockquote::before {
  content: '\201C';
  position: absolute;
  left: -0.8rem;
  top: -0.4rem;
  font-size: 2rem;
  color: var(--text-faint);
  font-style: italic;
}

.testimonial cite {
  font-family: var(--font-body);
  font-style: normal;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

@media (max-width: 900px) {
  .testimonials-grid { grid-template-columns: 1fr; gap: 3rem; }
}

/* --- Process / Studio --- */
.process-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
}

.process-image {
  aspect-ratio: 4/5;
  background: var(--surface-alt);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.95rem;
  text-align: center;
  padding: 2rem;
}

.process-text p {
  font-family: var(--font-body);
  font-size: 1.02rem;
  line-height: 1.75;
  color: var(--text-secondary);
  margin-bottom: 1rem;
}

.process-text p:first-child {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-style: italic;
  color: var(--text);
  line-height: 1.45;
  margin-bottom: 1.25rem;
}

@media (max-width: 900px) {
  .process-grid { grid-template-columns: 1fr; gap: 2.5rem; }
  .process-image { aspect-ratio: 3/2; }
}

/* --- FAQ (details/summary) --- */
.faq-list {
  max-width: var(--max-w-text);
  margin: 0 auto;
}

.faq-list details {
  border-bottom: 1px solid var(--hairline);
  padding: 1.4rem 0;
}

.faq-list details:first-child { border-top: 1px solid var(--hairline); }

.faq-list summary {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: 1.2rem;
  font-weight: 400;
  letter-spacing: -0.005em;
  color: var(--text);
  cursor: pointer;
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}

.faq-list summary::-webkit-details-marker { display: none; }

.faq-list summary::after {
  content: '+';
  font-family: var(--font-body);
  font-size: 1.4rem;
  font-weight: 300;
  color: var(--text-muted);
  transition: transform var(--transition);
  flex-shrink: 0;
}

.faq-list details[open] summary::after { content: '\2013'; }

.faq-list .faq-answer {
  padding-top: 1rem;
  font-size: 0.98rem;
  line-height: 1.7;
  color: var(--text-secondary);
  max-width: 60ch;
}

/* --- Exhibitions --- */
.exhibitions-list {
  border-top: 1px solid var(--hairline);
  max-width: 800px;
}

.exhibitions-list .exh-row {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 2rem;
  padding: 1.2rem 0;
  border-bottom: 1px solid var(--hairline);
  align-items: baseline;
}

.exhibitions-list .exh-year {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1rem;
  color: var(--text-muted);
}

.exhibitions-list .exh-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--text);
}

.exhibitions-list .exh-location {
  font-family: var(--font-body);
  font-size: 0.88rem;
  color: var(--text-muted);
  letter-spacing: 0.03em;
}

.exhibitions-empty {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--text-muted);
  padding: 2rem 0;
}

/* --- Newsletter --- */
.newsletter { background: var(--surface); }

.newsletter-inner {
  max-width: var(--max-w-text);
  margin: 0 auto;
  text-align: center;
}

.newsletter h2 {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  font-weight: 400;
  letter-spacing: -0.015em;
  line-height: 1.05;
  margin-bottom: 0.75rem;
}

.newsletter p {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--text-muted);
  margin-bottom: 2rem;
  font-size: 1.05rem;
}

.newsletter form {
  display: flex;
  gap: 1.5rem;
  max-width: 480px;
  margin: 0 auto;
  align-items: flex-end;
}

.newsletter .field {
  flex: 1;
  position: relative;
}

.newsletter label {
  display: block;
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  text-align: left;
}

.newsletter input[type="email"] {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border-strong);
  padding: 0.5rem 0;

function parseCSV(text) {
  const rows = [];
  let current = '', inQuotes = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') inQuotes = false;
      else current += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(current.trim()); current = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {

  row.push(current.trim());
  if (row.some(c => c !== '')) rows.push(row);
  return rows;

  return '';

  return {
    id: index + 1,
    title: get('title'),
    medium: get('medium').toLowerCase(),
    price: priceStr ? parseFloat(priceStr.replace(/[^0-9.]/g, '')) : null,
    sold: sold,
    size: get('size'),
    image: driveImageURL(get('image')),
    description: get('description'),
    collections: get('collection') ? get('collection').split(',').map(c => c.trim()).filter(Boolean) : [],
    available: !sold,
    featured: featured,
    // New optional fields — render only if present
    year: get('year'),
    surface: get('surface'),
    signed: get('signed'),
    framed: get('framed'),
    shippingFrom: get('shippingfrom'),
    certificate: get('certificate'),
    widthIn: (widthIn && !isNaN(widthIn)) ? widthIn : null,
    heightIn: (heightIn && !isNaN(heightIn)) ? heightIn : null,
    dominantColor: get('dominantcolor') || get('color') || ''
  };
}

async function loadFromSheet() {
  if (!SHEET_CSV_URL) return;
  try {
    document.getElementById('app').innerHTML = `
      <div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
        <p style="color:var(--text-muted);font-family:var(--font-display);font-style:italic;font-size:1.2rem;">Loading paintings&hellip;</p>
      </div>`;
    const response = await fetch(SHEET_CSV_URL);
    if (!response.ok) throw new Error('Could not fetch sheet');
    const text = await response.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('Sheet appears empty');
    const headers = rows[0].map(h => h.toLowerCase().replace(/[^a-z]/g,''));
    const paintings = rows.slice(1)
      .map((row, i) => sheetRowToPainting(row, headers, i))
      .filter(p => p.title);
    if (paintings.length > 0) PAINTINGS = paintings;
  } catch (err) {
    console.warn('Could not load from Google Sheet:', err.message);
  }
  injectPaintingsLD();
  render();
}

}

// Convert "16 x 20 in" or numeric inches to "16 × 20 in / 40.6 × 50.8 cm"
function formatDimensions(p) {
  if (p.widthIn && p.heightIn) {
    const wIn = p.widthIn, hIn = p.heightIn;
    const wCm = (wIn * 2.54).toFixed(1).replace(/\.0$/, '');
    const hCm = (hIn * 2.54).toFixed(1).replace(/\.0$/, '');
    return `${wIn} × ${hIn} in / ${wCm} × ${hCm} cm`;
  }
  if (p.size) {
    // Try to parse "16 x 20 in" or "16x20"
    const m = p.size.match(/(\d+(?:\.\d+)?)\s*[x×]\s*(\d+(?:\.\d+)?)/i);
    if (m) {
      const wIn = parseFloat(m[1]), hIn = parseFloat(m[2]);
      const wCm = (wIn * 2.54).toFixed(1).replace(/\.0$/, '');
      const hCm = (hIn * 2.54).toFixed(1).replace(/\.0$/, '');
      return `${wIn} × ${hIn} in / ${wCm} × ${hCm} cm`;
    }
    return p.size;
  }
  return '';
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

function paintingMeta(p) {
  // Build editorial meta string: "Acrylic on canvas. 2024. 16 × 20 in / 40.6 × 50.8 cm."
  const parts = [];
  const medium = p.medium ? capitalize(p.medium) : '';
  const surface = p.surface ? p.surface.toLowerCase() : '';
  if (medium && surface) parts.push(`${medium} on ${surface}`);
  else if (medium) parts.push(medium);
  if (p.year) parts.push(p.year);
  const dims = formatDimensions(p);
  if (dims) parts.push(dims);
  return parts.length ? parts.join('. ') + '.' : '';
}

function aspectRatioFor(p) {
  if (p.widthIn && p.heightIn && p.widthIn > 0 && p.heightIn > 0) {
    return `${p.widthIn}/${p.heightIn}`;
  }
  // Try to parse from size string
  if (p.size) {
    const m = p.size.match(/(\d+(?:\.\d+)?)\s*[x×]\s*(\d+(?:\.\d+)?)/i);
    if (m) {
      const w = parseFloat(m[1]), h = parseFloat(m[2]);
      if (w > 0 && h > 0) return `${w}/${h}`;
    }
  }
  return '4/5';
}

function placeholderGradient(id) {
  const grads = [
    'linear-gradient(160deg, #d6cfc1, #bfb6a4)',
    'linear-gradient(160deg, #c8c2b3, #aea796)',
    'linear-gradient(160deg, #ddd5c5, #c5bda9)',
    'linear-gradient(160deg, #b8b0a0, #9c9384)',
    'linear-gradient(160deg, #cec7b8, #b3aa97)',
    'linear-gradient(160deg, #d4ccbd, #b8b09e)',
    'linear-gradient(160deg, #b0a895, #918876)',
    'linear-gradient(160deg, #c4bcab, #a89f8c)',
    'linear-gradient(160deg, #d8d1c2, #c0b9a6)',
  ];
  return grads[id % grads.length];
}

// Inline hand-drawn SVG strikethrough for sold prices
const SOLD_STROKE_SVG = `<svg class="sold-stroke" viewBox="0 0 100 12" preserveAspectRatio="none" aria-hidden="true" focusable="false"><path d="M2 6 Q 30 3, 55 7 T 98 6" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>`;

function paintingImage(p, opts) {
  opts = opts || {};
  const alt = `${p.title} — original ${p.medium || 'painting'} painting by Sveta`;
  if (p.image) {
    const loadAttr = opts.isHero ? 'fetchpriority="high"' : 'loading="lazy" decoding="async"';
    const crossOrigin = opts.crossOrigin ? 'crossorigin="anonymous"' : '';
    // onload: derive the real aspect ratio from the loaded image so landscape
    // paintings don't get center-cropped by a portrait-default container.
    const onLoad = `onload="var c=this.closest('.card-image-inner');if(c&&this.naturalWidth&&this.naturalHeight)c.style.setProperty('--ratio',this.naturalWidth+'/'+this.naturalHeight);"`;
    return `<img src="${p.image}" alt="${alt}" ${loadAttr} ${crossOrigin} ${onLoad}>`;
  }
  return `<div style="width:100%;height:100%;min-height:240px;background:${placeholderGradient(p.id)};display:flex;align-items:center;justify-content:center;" role="img" aria-label="${alt}"><span style="font-family:var(--font-display);font-style:italic;font-size:1.1rem;color:rgba(20,19,15,0.22);text-align:center;padding:1rem;">${p.title}</span></div>`;
}

function cardHTML(p) {
  const ratio = aspectRatioFor(p);
  const priceHTML = p.sold
    ? `<span class="card-price sold">${p.price ? CURRENCY + p.price.toLocaleString() : 'Sold'}${SOLD_STROKE_SVG}</span>`
    : (p.price ? `<span class="card-price">${CURRENCY}${p.price.toLocaleString()}</span>` : '');
  const soldTag = p.sold ? `<span class="card-sold-tag">Sold</span>` : '';
  const meta = paintingMeta(p);
  return `
    <button class="painting-card reveal" type="button" data-card-id="${p.id}" onclick="openModal(${p.id})" aria-label="Open details for ${p.title}">
      <div class="card-image">
        <div class="card-image-inner" style="--ratio: ${ratio};">${paintingImage(p)}</div>
      </div>
      <div class="card-info">
        <div class="card-text">
          <div class="card-title">${p.title}${soldTag}</div>
          ${meta ? `<div class="card-meta">${meta}</div>` : ''}
        </div>
        ${priceHTML}
      </div>
    </button>`;
}

let lastFocusedElement = null;

function openModal(id) {
  const p = PAINTINGS.find(x => x.id === id);
  if (!p) return;
  lastFocusedElement = document.activeElement;

  const subject = encodeURIComponent(`Inquiry about "${p.title}"`);

  // Build meta rows — only render fields that have data
  const metaRows = [];
  const dims = formatDimensions(p);
  if (dims) metaRows.push(['Size', dims]);
  if (p.medium) metaRows.push(['Medium', capitalize(p.medium) + (p.surface ? ` on ${p.surface.toLowerCase()}` : '')]);
  if (p.year) metaRows.push(['Year', p.year]);
  if (p.signed) metaRows.push(['Signed', p.signed]);
  if (p.framed) metaRows.push(['Framing', p.framed]);
  if (p.shippingFrom) metaRows.push(['Ships from', p.shippingFrom]);
  if (p.certificate) metaRows.push(['Authenticity', p.certificate]);

  const metaHTML = metaRows.length
    ? `<div class="modal-meta">${metaRows.map(([l, v]) =>
        `<div class="row"><span class="label">${l}</span><span class="value">${v}</span></div>`
      ).join('')}</div>`
    : '';

  const priceHTML = p.sold
    ? `<div class="modal-price sold">${p.price ? `${CURRENCY}${p.price.toLocaleString()}` : 'Sold'}${SOLD_STROKE_SVG}</div>`
    : (p.price ? `<div class="modal-price">${CURRENCY}${p.price.toLocaleString()}</div>` : '');

  const ctaHTML = p.sold
    ? `<div class="modal-cta">
         <div class="cta-note"><span class="italic">This piece has found a home.</span> Write to commission something similar, or to be notified about new work.</div>
         <a href="mailto:${CONTACT_EMAIL}?subject=${subject}" class="cta-link">Write to studio &rarr;</a>
       </div>`
    : `<div class="modal-cta">
         <a href="mailto:${CONTACT_EMAIL}?subject=${subject}" class="cta-link">Write to studio &rarr;</a>
         <div class="cta-note">Typical reply within 24 hours &middot; Worldwide shipping with insurance &middot; 14-day returns</div>
       </div>`;

  const collectionsHTML = (p.collections || []).length
    ? `<div class="modal-collections">${(p.collections || []).map(c =>
        `<button class="chip" type="button" onclick="closeModal();showPage('collection:${encodeURIComponent(c)}')">${c}</button>`
      ).join('')}</div>`
    : '';

  const subMeta = paintingMeta(p);

  // Modal image needs crossorigin for canvas sampling. Will silently fall back
  // if CORS blocks (Google Drive sometimes does).
  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    <div class="modal-image">${paintingImage(p, { crossOrigin: true })}</div>
    <div class="modal-details">
      <h2 id="modalTitle">${p.title}</h2>
      ${subMeta ? `<div class="modal-sub">${subMeta}</div>` : ''}
      ${p.description ? `<p class="description">${p.description}</p>` : ''}
      ${priceHTML}
      ${metaHTML}
      ${ctaHTML}
      ${collectionsHTML}
    </div>`;

  // Make page behind modal inert for assistive tech + keyboard
  const mainEl = document.querySelector('main');
  if (mainEl) {
    mainEl.setAttribute('inert', '');
    mainEl.setAttribute('aria-hidden', 'true');
  }

  // Apply dominant color: prefer Sheet-provided p.dominantColor, otherwise
  // sample from the loaded image (canvas, with reduced-motion guard).
  applyAccentTint(p);

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Focus management
  setTimeout(() => {
    const closeBtn = document.querySelector('.modal-close');
    if (closeBtn) closeBtn.focus();
  }, 50);
}

function applyAccentTint(p) {
  // Reset to default first
  document.documentElement.style.removeProperty('--accent-tint');
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  if (p.dominantColor) {
    document.documentElement.style.setProperty('--accent-tint', p.dominantColor);
    return;
  }

  // Sample from the modal image once it has loaded
  const img = document.querySelector('.modal-image img');
  if (!img) return;
  const finish = () => {
    try {
      const canvas = document.createElement('canvas');
      const W = 32, H = 32;
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, W, H);
      // Sample center 60% region (avoids edges / frame artifacts)
      const data = ctx.getImageData(W * 0.2, H * 0.2, W * 0.6, H * 0.6).data;
      let r = 0, g = 0, b = 0, n = 0;
      for (let i = 0; i < data.length; i += 4) { r += data[i]; g += data[i+1]; b += data[i+2]; n++; }
      r = Math.round(r/n); g = Math.round(g/n); b = Math.round(b/n);
      // Mix with bone (#EAE6DE → 234,230,222) at 55% to desaturate
      const mix = (a, b) => Math.round(a * 0.55 + b * 0.45);
      const rm = mix(r, 234), gm = mix(g, 230), bm = mix(b, 222);
      document.documentElement.style.setProperty('--accent-tint', `rgb(${rm}, ${gm}, ${bm})`);
    } catch (e) {
      // CORS-tainted canvas — silently keep default accent
    }
  };
  if (img.complete && img.naturalWidth > 0) finish();
  else img.addEventListener('load', finish, { once: true });
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';

  // Reset accent tint
  document.documentElement.style.removeProperty('--accent-tint');

  // Un-inert main
  const mainEl = document.querySelector('main');
  if (mainEl) {
    mainEl.removeAttribute('inert');
    mainEl.removeAttribute('aria-hidden');
  }

  // Guard against detached node (race: e.g. card was re-rendered while modal was open)
  if (lastFocusedElement && typeof lastFocusedElement.focus === 'function' && lastFocusedElement.isConnected) {
    lastFocusedElement.focus();
  }
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  // Focus trap inside modal
  if (e.key === 'Tab' && document.getElementById('modal').classList.contains('open')) {
    const focusables = document.querySelectorAll('.modal a, .modal button, .modal [tabindex]:not([tabindex="-1"])');
    if (focusables.length === 0) return;
    const first = focusables[0];
    const last = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }
});

/* ========================================================
   JSON-LD: VisualArtwork schema for each painting
   ======================================================== */
function injectPaintingsLD() {
  try {
    const items = PAINTINGS.slice(0, 12).map(p => {
      const obj = {
        "@context": "https://schema.org",
        "@type": "VisualArtwork",
        "name": p.title,
        "artMedium": p.medium ? capitalize(p.medium) : undefined,
        "artworkSurface": p.surface || undefined,
        "artform": "Painting",
        "creator": { "@type": "Person", "name": "Sveta" },
        "dateCreated": p.year || undefined,
        "image": p.image || undefined,
        "width": p.widthIn ? `${p.widthIn} in` : undefined,
        "height": p.heightIn ? `${p.heightIn} in` : undefined,
        "offers": p.sold ? undefined : (p.price ? {
          "@type": "Offer",
          "price": p.price,
          "priceCurrency": "USD",
          "availability": "https://schema.org/InStock"
        } : undefined)
      };
      Object.keys(obj).forEach(k => obj[k] === undefined && delete obj[k]);
      return obj;
    });
    const tag = document.getElementById('paintings-ld');
    if (tag) tag.textContent = JSON.stringify(items, null, 2);
  } catch (e) { /* swallow */ }
}

function render() {
  const app = document.getElementById('app');
  let html;
  if (currentPage.startsWith('collection:')) {
    let raw = currentPage.split(':').slice(1).join(':');
    try { raw = decodeURIComponent(raw); } catch (e) { /* ignore */ }
    html = renderCollectionDetail(raw);
  } else switch (currentPage) {
    case 'paintings':   html = renderPaintings(); break;
    case 'postcards':   html = renderPostcards(); break;
    case 'collections': html = renderCollections(); break;
    case 'about':       html = renderAbout(); break;
    case 'faq':         html = renderFAQ(); break;
    case 'past':        html = renderPastWork(); break;
    default:            html = renderHome(); break;
  }
  app.innerHTML = html;

  // Update <title>
  document.title = pageTitleFor(currentPage);

  // Re-render footer (it depends on SITE_DATA which is stable, but page links
  // benefit from being injected after main)
  renderFooter();

  // Update active nav link
  document.querySelectorAll('nav .nav-links a').forEach(a => a.classList.remove('active'));
  let navKey = '';
  if (currentPage === 'paintings' || currentPage === 'past' || currentPage.startsWith('collection:') || currentPage === 'collections') navKey = 'works';
  else if (currentPage === 'postcards') navKey = 'postcards';
  else if (currentPage === 'about') navKey = 'about';
  else if (currentPage === 'faq') navKey = 'faq';
  if (navKey) {
    const link = document.querySelector(`nav .nav-links a[data-page="${navKey}"]`);
    if (link) link.classList.add('active');
  }

  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), Math.min(i * 50, 600));
    });
    // Compute masonry row spans after layout
    computeMasonry();
  });
  // Recompute again once images have loaded — image height may grow.
  document.querySelectorAll('.gallery-grid img').forEach(img => {
    if (!img.complete) img.addEventListener('load', computeMasonry, { once: true });
  });

  // Wire up the custom cursor for newly-rendered cards
  wireCustomCursor();
}

/* ========================================================
   CSS GRID MASONRY — compute span per card from rendered height
   ======================================================== */
function computeMasonry() {
  document.querySelectorAll('.gallery-grid[data-masonry]').forEach(grid => {
    const rowH = parseFloat(getComputedStyle(grid).gridAutoRows) || 8;
    const rowGap = parseFloat(getComputedStyle(grid).rowGap) || 0;
    grid.querySelectorAll('.painting-card').forEach(card => {
      // Include margin-bottom so cards don't overlap vertically.
      const mb = parseFloat(getComputedStyle(card).marginBottom) || 0;
      const h = card.getBoundingClientRect().height + mb;
      const span = Math.ceil((h + rowGap) / (rowH + rowGap));
      card.style.gridRow = `span ${span}`;
    });
    grid.classList.add('masonry-ready');
  });
}

// Debounced resize
let _resizeTO = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTO);
  _resizeTO = setTimeout(computeMasonry, 100);
});

/* ========================================================
   CUSTOM CURSOR — disabled on touch + reduced-motion
   ======================================================== */
let cursorEl = null;
function initCustomCursor() {
  if (!window.matchMedia) return;
  if (window.matchMedia('(hover: none)').matches) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  cursorEl = document.createElement('div');
  cursorEl.className = 'custom-cursor';
  cursorEl.setAttribute('aria-hidden', 'true');
  document.body.appendChild(cursorEl);

  document.addEventListener('mousemove', (e) => {
    if (!cursorEl) return;
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top = e.clientY + 'px';
  }, { passive: true });
}

function wireCustomCursor() {
  if (!cursorEl) return;
  const targets = document.querySelectorAll('.painting-card, .hero-image-wrap');
  targets.forEach(t => {
    if (t._cursorWired) return;
    t._cursorWired = true;
    t.addEventListener('mouseenter', () => {
      // Compute card number from order in its grid
      let label = 'View';
      const card = t.closest('.painting-card') || (t.classList.contains('painting-card') ? t : null);
      if (card) {
        const grid = card.parentElement;
        if (grid) {
          const cards = Array.from(grid.querySelectorAll('.painting-card'));
          const idx = cards.indexOf(card) + 1;
          if (idx > 0) label = `View №${String(idx).padStart(2,'0')}`;
        }
      } else if (t.classList.contains('hero-image-wrap')) {
        label = 'View №01';
      }
      cursorEl.textContent = label;
      cursorEl.classList.add('visible');
      document.body.classList.add('cursor-hide');
    });
    t.addEventListener('mouseleave', () => {
      cursorEl.classList.remove('visible');
      document.body.classList.remove('cursor-hide');
    });
  });
}

// Boot
initCustomCursor();
if (SHEET_CSV_URL) loadFromSheet();
else { injectPaintingsLD(); render(); }

TECHNICAL BUG FIXES
T1. Gallery layout switched from CSS columns (which read top-
    to-bottom by column, breaking Sveta's intended order) to
    a CSS Grid masonry implementation that preserves left-to-
    right reading order. JS sizes each card via grid-row span
    computed from its rendered height + margin. Recomputes on
    resize and after image load.
T2. openModal() now sets inert + aria-hidden on <main>, removed
    on close. Keyboard and AT users no longer reach the page
    behind the modal.
T3. --text-faint darkened from #8C8478 to #6B6258 (4.6:1 contrast
    on bone, passes WCAG AA).
T4. Postcards filter widened: matches medium 'watercolor' OR
    'watercolour' OR a 'postcards' collection tag. Empty state
    text is now informative ("Watercolor postcards drop
    seasonally. New batch this spring."), no [TODO]. Also added
    a watercolor placeholder to the fallback PAINTINGS array so
    Postcards page isn't empty when the Sheet is unreachable.
T5. paintingImage() takes an isHero flag: hero now uses
    fetchpriority="high" instead of loading="lazy".
T6. og:image meta tag removed from static HTML. JS injects
    og:image + twitter:image dynamically only when
    SITE_DATA.ogImage is set.
T7. document.title updates on every showPage() call.
T8. Collections page: collection-card title is <h2> instead of
    <h3> (fixes heading skip from page <h1>). Also adds
    visually-hidden <h2>All collections</h2> for screen readers.
T9. .modal-close enlarged to 44×44px with rounded background
    for adequate touch target.
T10. <em>Colours</em> in hero / <em>Inquiries</em> in contact
     replaced with <span class="italic"> — em is for emphasis,
     not visual styling.
T11. sheetRowToPainting: sold is now determined ONLY by the
     'sold' column. featured is a separate flag. available =
     !sold. Old confusing logic ("featured=no → sold=true") is
     gone.
T12. Hero pickup logic: featured → first available → first
     painting overall.
T13. All href="#" replaced with href="#works" / "#about" / etc
     and onclick handlers explicitly call event.preventDefault().
     Right-click "open in new tab" lands somewhere sensible.
T14. closeModal() checks lastFocusedElement.isConnected before
     calling .focus() — avoids the race where the hero card was
     re-rendered while the modal was open.
T15. Newsletter input has explicit <label class="visually-hidden">
     for "Email address" plus matching aria-label.
